<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Browser Smash - SP & Sword Buff</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; overflow: hidden; }
        #menu, #result-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #1a1a1a; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: #333; padding: 25px; border-radius: 15px; margin: 10px; text-align: left; }
        select { padding: 10px; font-size: 16px; border-radius: 5px; border: none; width: 160px; cursor: pointer; }
        button { background: #ff4757; color: white; cursor: pointer; font-size: 22px; padding: 15px 50px; border: none; border-radius: 8px; margin: 15px; transition: 0.2s; }
        button:hover { background: #ff6b81; transform: scale(1.05); }

        #game-container { display: none; }
        #ui-container { margin-top: 10px; display: flex; justify-content: center; gap: 30px; }
        .status-card { background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; border: 2px solid #444; min-width: 200px; }
        .damage-percent { font-size: 40px; font-weight: bold; margin: 5px 0; }
        
        #game-stage {
            width: 1000px; height: 500px; margin: 10px auto;
            background: linear-gradient(to bottom, #1e3c72, #2a5298);
            border: 5px solid #000; position: relative; overflow: hidden;
        }
        .main-platform { position: absolute; left: 200px; bottom: 100px; width: 600px; height: 30px; background: #444; border-bottom: 8px solid #222; }
        .player { position: absolute; width: 40px; height: 60px; z-index: 10; transition: opacity 0.2s; }
        .invincible { opacity: 0.4; }
        
        .item { position: absolute; width: 30px; height: 30px; border-radius: 5px; border: 2px solid white; animation: pulse 0.6s infinite alternate; }
        @keyframes pulse { from { transform: scale(0.9); } to { transform: scale(1.1); } }

        .weapon { position: absolute; top: 30px; width: 25px; height: 5px; background: #888; display: none; }
        .type-sword .weapon { display: block; background: #00ffff; width: 40px; transform: rotate(-20deg); right: -25px; } /* 剣を長く */
        .type-gun .weapon { display: block; background: #333; width: 15px; height: 10px; right: -10px; }
        .projectile { position: absolute; width: 15px; height: 15px; border-radius: 50%; box-shadow: 0 0 10px white; }
        #overlay { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); font-size: 70px; font-weight: bold; color: #ff0; text-shadow: 4px 4px 0 #000; pointer-events: none; z-index: 100; }
        .sp-ready { border: 2px solid #ff0 !important; box-shadow: 0 0 15px #ff0; }
    </style>
</head>
<body>

    <div id="menu">
        <h1 style="color: #ff4757; font-size: 45px;">BROWSER SMASH - SP</h1>
        <div class="config-grid">
            <strong>【Player 1 (Blue)】</strong>
            <strong>【Player 2 (Red)】</strong>
            <div>タイプ: <select id="type1"><option value="fighter">格闘</option><option value="sword">剣</option><option value="gun">銃</option></select></div>
            <div>タイプ: <select id="type2"><option value="fighter">格闘</option><option value="sword" selected>剣</option><option value="gun">銃</option></select></div>
            <div>操作系: <select id="style1"><option value="wasd">WASD (SP:V)</option><option value="arrow">矢印 (SP:Enter)</option></select></div>
            <div>操作系: <select id="style2"><option value="arrow" selected>矢印 (SP:Enter)</option><option value="wasd">WASD (SP:V)</option></select></div>
        </div>
        <div>
            <span>アイテム: <select id="item-toggle"><option value="on">あり</option><option value="off">なし</option></select></span>
            <button onclick="startGame('com')">vs COM</button>
            <button onclick="startGame('p2')">vs 2P</button>
        </div>
    </div>

    <div id="result-screen" style="display:none;">
        <h1 id="winner-text"></h1>
        <button onclick="location.reload()">リトライ</button>
    </div>

    <div id="game-container">
        <div id="ui-container">
            <div id="p1-card" class="status-card">
                <div id="p1-info">P1</div>
                <div id="p1-val" class="damage-percent">0%</div>
                <div id="p1-sub" style="color:#ff4757">●●●</div>
                <div id="p1-sp-ui" style="font-size:12px; color:#ff0;">SP: READY</div>
            </div>
            <div id="p2-card" class="status-card">
                <div id="p2-info">P2</div>
                <div id="p2-val" class="damage-percent">0%</div>
                <div id="p2-sub" style="color:#ff4757">●●●</div>
                <div id="p2-sp-ui" style="font-size:12px; color:#ff0;">SP: READY</div>
            </div>
        </div>
        <div id="game-stage">
            <div id="overlay"></div>
            <div class="main-platform"></div>
            <div id="p1" class="player"></div>
            <div id="p2" class="player"></div>
        </div>
    </div>

<script>
const GRAVITY = 0.45, FRICTION = 0.88, GROUND_Y = 100;
let mode = "p2", isRunning = false, projectiles = [], items = [], keys = {};
let itemEnabled = true;

const CONTROL_CONFIGS = {
    wasd: { up: "KeyW", left: "KeyA", right: "KeyD", atk: "KeyG", proj: "KeyH", sp: "KeyV" },
    arrow: { up: "ArrowUp", left: "ArrowLeft", right: "ArrowRight", atk: "Comma", proj: "Period", sp: "Enter" }
};

class Fighter {
    constructor(id, x, color, label) {
        this.id = id; this.el = document.getElementById(id); this.startX = x; this.color = color; this.label = label;
        this.stock = 3; this.spReady = true; this.reset(true);
    }
    reset(full) {
        if(full) this.stock = 3;
        this.x = this.startX; this.y = 350; this.vx = 0; this.vy = 0; this.damage = 0;
        this.dir = (this.x < 500) ? 1 : -1; this.jumps = 0; this.isAtk = false;
        this.controls = CONTROL_CONFIGS[document.getElementById(this.id==="p1"?"style1":"style2").value];
        this.isInvincible = true; this.el.classList.add("invincible");
        setTimeout(() => { this.isInvincible = false; this.el.classList.remove("invincible"); }, 1200);

        this.type = document.getElementById(this.id==="p1"?"type1":"type2").value;
        const stats = { 
            fighter: [14, 0, 0, 450], 
            sword: [10, 7, 12, 400], // 剣を強化
            gun: [4, 5, 18, 180] 
        };
        [this.meleeP, this.projP, this.projS, this.cd] = stats[this.type];
        this.el.className = `player type-${this.type}`;
        this.el.innerHTML = `<div style="position:absolute;top:-30px;width:100%;text-align:center;font-size:12px;font-weight:bold;">${this.label}</div>
                             <div style="width:24px;height:24px;background:#ffd1a4;border-radius:50%;margin:0 auto;border:2px solid #000;"></div>
                             <div style="width:22px;height:32px;background:${this.color};margin:-2px auto;border:2px solid #000;border-radius:5px;"></div>
                             <div class="weapon"></div>`;
    }
    update() {
        this.vy -= GRAVITY; this.x += this.vx; this.y += this.vy; this.vx *= FRICTION;
        if (this.x+30 > 200 && this.x < 770 && this.y <= GROUND_Y && this.vy <= 0 && this.y > GROUND_Y-30) {
            this.y = GROUND_Y; this.vy = 0; this.jumps = 0;
        }
        if (this.x < -150 || this.x > 1150 || this.y < -200 || this.y > 900) this.out();
        this.draw();
    }
    draw() {
        this.el.style.left = this.x + "px"; this.el.style.bottom = this.y + "px";
        this.el.style.transform = `scaleX(${this.dir})`;
        document.getElementById(this.id+"-val").innerText = Math.floor(this.damage) + "%";
        document.getElementById(this.id+"-sub").innerText = "●".repeat(Math.max(0, this.stock));
        const spUI = document.getElementById(this.id+"-sp-ui");
        spUI.innerText = this.spReady ? "SP: READY" : "SP: RECHARGING";
        document.getElementById(this.id+"-card").classList.toggle("sp-ready", this.spReady);
    }
    out() {
        this.stock--;
        if(this.stock <= 0) endGame(this.id==="p1"?"PLAYER 2":"PLAYER 1"); else { showEffect("K.O."); this.reset(false); }
    }
    attack(target, isProj) {
        if(this.isAtk) return; this.isAtk = true;
        if(isProj && this.type !== "fighter") {
            this.fireProjectile(this.projP, this.projS);
        } else {
            const range = (this.type==="sword"?100:60); // 剣のリーチ強化
            if(Math.abs((this.x+(this.dir*25))-target.x)<range && Math.abs(this.y-target.y)<50) this.hit(target, this.meleeP, this.type==="fighter"?1.6:1.1);
        }
        setTimeout(()=>this.isAtk=false, isProj ? this.cd : 300);
    }
    fireProjectile(pwr, speed) {
        const p = { x: this.x + (this.dir*40), y: this.y + 25, vx: this.dir*speed, owner: this, pwr, el: document.createElement("div") };
        p.el.className = "projectile"; p.el.style.background = (this.type==="sword"?"#00ffff":"#ffff00");
        document.getElementById("game-stage").appendChild(p.el); projectiles.push(p);
    }
    useSP(target) {
        if(!this.spReady) return;
        this.spReady = false;
        showEffect(this.type.toUpperCase() + " SP!!");
        
        if(this.type === "fighter") {
            // 爆速突進
            this.vx = this.dir * 35;
            setTimeout(() => {
                if(Math.abs(this.x - target.x) < 100 && Math.abs(this.y - target.y) < 80) this.hit(target, 35, 2.5);
            }, 100);
        } else if(this.type === "sword") {
            // 巨大斬撃
            for(let i=0; i<3; i++) {
                setTimeout(() => this.fireProjectile(12, 15), i*100);
            }
        } else if(this.type === "gun") {
            // 全画面掃射
            for(let i=0; i<8; i++) {
                setTimeout(() => this.fireProjectile(5, 25), i*80);
            }
        }
        setTimeout(() => { this.spReady = true; }, 10000); // 10秒リロード
    }
    hit(target, pwr, kbM) {
        if(target.isInvincible) return;
        target.damage += pwr;
        const kb = ((target.damage / 5) + 8) * kbM;
        target.vx = (target.x < this.x ? -1 : 1) * kb; target.vy = kb * 0.3 + 5;
    }
}

let p1, p2;

function startGame(m) {
    mode = m; 
    itemEnabled = document.getElementById("item-toggle").value === "on";
    p1 = new Fighter("p1", 300, "#3498db", "1P");
    p2 = new Fighter("p2", 660, "#e74c3c", "2P");
    document.getElementById("menu").style.display = "none"; document.getElementById("game-container").style.display = "block";
    isRunning = true; loop();
}

function endGame(win) { isRunning = false; document.getElementById("result-screen").style.display = "flex"; document.getElementById("winner-text").innerText = win + " WINS!"; }

window.addEventListener("keydown", e => {
    keys[e.code] = true;
    if(!isRunning) return;
    if(e.code === p1.controls.up && p1.jumps < 2) { p1.vy=12; p1.jumps++; }
    if(e.code === p1.controls.atk) p1.attack(p2, false);
    if(e.code === p1.controls.proj) p1.attack(p2, true);
    if(e.code === p1.controls.sp) p1.useSP(p2);
    if(mode==="p2") {
        if(e.code === p2.controls.up && p2.jumps < 2) { p2.vy=12; p2.jumps++; }
        if(e.code === p2.controls.atk) p2.attack(p1, false);
        if(e.code === p2.controls.proj) p2.attack(p1, true);
        if(e.code === p2.controls.sp) p2.useSP(p1);
    }
});
window.addEventListener("keyup", e => keys[e.code] = false);

function loop() {
    if(!isRunning) return;
    if(keys[p1.controls.left]) { p1.vx -= 0.8; p1.dir = -1; }
    if(keys[p1.controls.right]) { p1.vx += 0.8; p1.dir = 1; }
    if(mode==="p2") {
        if(keys[p2.controls.left]) { p2.vx -= 0.8; p2.dir = -1; }
        if(keys[p2.controls.right]) { p2.vx += 0.8; p2.dir = 1; }
    } else {
        let diff = p1.x - p2.x;
        if(Math.abs(diff) > 100) { p2.vx += (diff>0?0.5: -0.5); p2.dir = diff>0?1:-1; }
        if(Math.abs(diff) < 300 && Math.random() < 0.03) p2.attack(p1, Math.abs(diff) > 120);
        if(Math.random() < 0.005) p2.useSP(p1);
        if(p2.y <= GROUND_Y && Math.random() < 0.05) { p2.vy = 12; p2.jumps++; }
    }
    p1.update(); p2.update();

    projectiles.forEach((p, i) => {
        p.x += p.vx; p.el.style.left = p.x+"px"; p.el.style.bottom = p.y+"px";
        let target = p.owner === p1 ? p2 : p1;
        if(Math.abs(p.x-target.x)<30 && Math.abs(p.y-(target.y+30))<30) {
            if(!target.isInvincible) p.owner.hit(target, p.pwr, 0.9);
            p.el.remove(); projectiles.splice(i, 1);
        } else if(p.x < -200 || p.x > 1200) { p.el.remove(); projectiles.splice(i, 1); }
    });

    items.forEach((it, i) => {
        it.y -= 2; it.el.style.left = it.x+"px"; it.el.style.bottom = it.y+"px";
        [p1, p2].forEach(p => {
            if(Math.abs(p.x-it.x)<35 && Math.abs(p.y-it.y)<40) {
                if(it.type === "heal") { p.damage = Math.max(0, p.damage - 50); showEffect("HEAL"); }
                else { p.damage += 40; p.vx = (p.x < it.x ? -20 : 20); p.vy = 15; showEffect("BOOM!"); }
                it.el.remove(); items.splice(i, 1);
            }
        });
        if(it.y < -50) { it.el.remove(); items.splice(i, 1); }
    });
    // アイテム出現率を低下 (0.006 -> 0.002)
    if(itemEnabled && Math.random() < 0.002) {
        const type = Math.random() > 0.5 ? "heal" : "bomb";
        const it = { x: 250 + Math.random()*500, y: 500, type, el: document.createElement("div") };
        it.el.className = "item"; it.el.style.background = type === "heal" ? "#2ecc71" : "#ff4757";
        document.getElementById("game-stage").appendChild(it.el); items.push(it);
    }

    requestAnimationFrame(loop);
}
function showEffect(t) { const o = document.getElementById("overlay"); o.innerText = t; setTimeout(()=>o.innerText="", 1000); }
</script>
</body>
</html>
