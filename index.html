<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Browser Smash - Fixed & SP</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; overflow: hidden; }
        #menu, #result-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #1a1a1a; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: #333; padding: 20px; border-radius: 15px; margin: 10px; text-align: left; }
        select { padding: 8px; font-size: 14px; border-radius: 5px; width: 150px; }
        button { background: #ff4757; color: white; cursor: pointer; font-size: 20px; padding: 12px 40px; border: none; border-radius: 8px; margin: 10px; }
        
        #game-container { display: none; }
        #ui-container { margin-top: 5px; display: flex; justify-content: center; gap: 20px; }
        .status-card { background: rgba(0,0,0,0.8); padding: 8px; border-radius: 10px; border: 2px solid #444; min-width: 150px; position: relative; }
        .damage-percent { font-size: 28px; font-weight: bold; margin: 2px 0; }
        .sp-gauge { font-size: 10px; color: #ff0; }
        
        #game-stage {
            width: 1100px; height: 600px; margin: 5px auto;
            background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
            border: 4px solid #000; position: relative; overflow: hidden;
        }
        .platform { position: absolute; background: #444; border-bottom: 5px solid #222; border-radius: 4px; }
        .main-floor { background: #555; border-bottom: 8px solid #222; }

        .player { position: absolute; width: 40px; height: 60px; z-index: 10; transition: opacity 0.2s; }
        .invincible { opacity: 0.4; }
        .item { position: absolute; width: 25px; height: 25px; border-radius: 4px; border: 2px solid white; z-index: 5; }
        .projectile { position: absolute; width: 15px; height: 15px; border-radius: 50%; box-shadow: 0 0 10px white; z-index: 15; }
        #overlay { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); font-size: 60px; font-weight: bold; color: #ff0; text-shadow: 3px 3px 0 #000; pointer-events: none; z-index: 100; }
        
        .type-sword::after { content: ''; position: absolute; top: 30px; right: -25px; width: 40px; height: 6px; background: #0ff; transform: rotate(-20deg); display: block; border-radius: 2px; }
        .type-gun::after { content: ''; position: absolute; top: 30px; right: -10px; width: 15px; height: 10px; background: #333; display: block; border-radius: 2px; }
    </style>
</head>
<body>

    <div id="menu">
        <h1 style="color: #ff4757;">BROWSER SMASH - SP & FIXED</h1>
        <div class="config-grid">
            <strong>【Player 1】</strong><strong>【Player 2】</strong>
            <div>タイプ: <select id="type1"><option value="fighter">格闘</option><option value="sword">剣</option><option value="gun">銃</option></select></div>
            <div>タイプ: <select id="type2"><option value="fighter">格闘</option><option value="sword" selected>剣</option><option value="gun">銃</option></select></div>
            <div>操作: <select id="style1"><option value="wasd">WASD (SP:V)</option><option value="arrow">矢印 (SP:Ent)</option></select></div>
            <div>操作: <select id="style2"><option value="arrow" selected>矢印 (SP:Ent)</option><option value="wasd">WASD (SP:V)</option></select></div>
            <strong>【ゲーム設定】</strong><div></div>
            <span>ステージ:</span>
            <select id="stage-select">
                <option value="final">終点</option>
                <option value="small">小戦場</option>
                <option value="battle" selected>戦場</option>
            </select>
            <span>アイテム: <select id="item-toggle"><option value="on">ON</option><option value="off">OFF</option></select></span>
        </div>
        <button onclick="startGame('com')">VS COM</button>
        <button onclick="startGame('p2')">VS 2P</button>
    </div>

    <div id="result-screen" style="display:none;">
        <h1 id="winner-text"></h1>
        <button onclick="location.reload()">タイトルへ</button>
    </div>

    <div id="game-container">
        <div id="ui-container">
            <div id="p1-card" class="status-card">P1 <div id="p1-val" class="damage-percent">0%</div><div id="p1-sub">●●●</div><div id="p1-sp" class="sp-gauge">SP: READY</div></div>
            <div id="p2-card" class="status-card">P2 <div id="p2-val" class="damage-percent">0%</div><div id="p2-sub">●●●</div><div id="p2-sp" class="sp-gauge">SP: READY</div></div>
        </div>
        <div id="game-stage">
            <div id="overlay"></div>
        </div>
    </div>

<script>
const GRAVITY = 0.45, FRICTION = 0.88;
let mode = "p2", isRunning = false, projectiles = [], items = [], keys = {}, platforms = [];

const CONTROL_CONFIGS = {
    wasd: { up: "KeyW", left: "KeyA", right: "KeyD", atk: "KeyG", proj: "KeyH", sp: "KeyV" },
    arrow: { up: "ArrowUp", left: "ArrowLeft", right: "ArrowRight", atk: "Comma", proj: "Period", sp: "Enter" }
};

class Fighter {
    constructor(id, x, color, label) {
        this.id = id; this.el = null; this.startX = x; this.color = color; this.label = label;
        this.stock = 3; this.spReady = true; this.damage = 0;
    }
    reset(full) {
        if(full) { this.stock = 3; this.damage = 0; }
        this.x = this.startX; this.y = 400; this.vx = 0; this.vy = 0;
        this.dir = (this.x < 550) ? 1 : -1; this.jumps = 0; this.isAtk = false;
        this.controls = CONTROL_CONFIGS[document.getElementById(this.id==="p1"?"style1":"style2").value];
        this.isInvincible = true;
        setTimeout(() => this.isInvincible = false, 1200);

        this.type = document.getElementById(this.id==="p1"?"type1":"type2").value;
        const stats = { fighter: [14, 0, 0, 450], sword: [11, 7, 14, 380], gun: [4, 5, 20, 160] };
        [this.meleeP, this.projP, this.projS, this.cd] = stats[this.type];
        
        if(!this.el) {
            this.el = document.createElement("div");
            this.el.id = this.id;
            document.getElementById("game-stage").appendChild(this.el);
        }
        this.el.className = `player type-${this.type}`;
        this.el.innerHTML = `<div style="position:absolute;top:-25px;width:100%;text-align:center;font-size:11px;">${this.label}</div>
                             <div style="width:20px;height:20px;background:#ffd1a4;border-radius:50%;margin:0 auto;border:2px solid #000;"></div>
                             <div style="width:22px;height:30px;background:${this.color};margin:-2px auto;border:2px solid #000;border-radius:4px;"></div>`;
    }
    update() {
        this.vy -= GRAVITY; this.x += this.vx; this.y += this.vy; this.vx *= FRICTION;
        
        // 足場当たり判定（改善版）
        platforms.forEach(p => {
            const isInsideWidth = (this.x + 30 > p.x && this.x < p.x + p.w);
            if (this.vy <= 0 && isInsideWidth) {
                // 足場の上端とプレイヤーの足元の距離をチェック（誤差15px以内なら着地）
                if (this.y >= p.y && this.y <= p.y + 15) {
                    this.y = p.y; this.vy = 0; this.jumps = 0;
                }
            }
        });

        if (this.x < -150 || this.x > 1250 || this.y < -200 || this.y > 900) this.out();
        
        this.el.style.left = this.x + "px";
        this.el.style.bottom = this.y + "px";
        this.el.style.transform = `scaleX(${this.dir})`;
        this.el.style.opacity = this.isInvincible ? 0.4 : 1;

        document.getElementById(this.id+"-val").innerText = Math.floor(this.damage) + "%";
        document.getElementById(this.id+"-sub").innerText = "●".repeat(Math.max(0, this.stock));
        document.getElementById(this.id+"-sp").innerText = this.spReady ? "SP: READY" : "SP: CHARGING";
        document.getElementById(this.id+"-sp").style.color = this.spReady ? "#ff0" : "#666";
    }
    out() {
        this.stock--;
        if(this.stock <= 0) endGame(this.id==="p1"?"P2":"P1"); 
        else { showEffect("K.O."); this.reset(false); }
    }
    attack(target, isProj) {
        if(this.isAtk) return; this.isAtk = true;
        if(isProj && this.type !== "fighter") {
            this.fireProjectile(this.projP, this.projS);
        } else {
            const range = (this.type==="sword"?110:70);
            if(Math.abs((this.x+(this.dir*25))-target.x)<range && Math.abs(this.y-target.y)<60) {
                this.hit(target, this.meleeP, this.type==="fighter"?1.7:1.3);
            }
        }
        setTimeout(()=>this.isAtk=false, isProj ? this.cd : 300);
    }
    fireProjectile(pwr, speed) {
        const p = { x: this.x + (this.dir*40), y: this.y + 25, vx: this.dir*speed, owner: this, pwr, el: document.createElement("div") };
        p.el.className = "projectile"; p.el.style.background = (this.type==="sword"?"#00ffff":"#ffff00");
        document.getElementById("game-stage").appendChild(p.el); projectiles.push(p);
    }
    useSP(target) {
        if(!this.spReady) return; 
        this.spReady = false; 
        showEffect(this.type.toUpperCase() + " SP!");
        
        if(this.type === "fighter") {
            this.vx = this.dir * 40;
            setTimeout(()=> { if(Math.abs(this.x-target.x)<120) this.hit(target,38,2.8); }, 150);
        } else if(this.type === "sword") {
            for(let i=0;i<4;i++) setTimeout(()=>this.fireProjectile(13,18), i*150);
        } else {
            for(let i=0;i<12;i++) setTimeout(()=>this.fireProjectile(5,24), i*60);
        }
        setTimeout(()=>this.spReady=true, 10000);
    }
    hit(target, pwr, kbM) {
        if(target.isInvincible) return; 
        target.damage += pwr;
        const kb = ((target.damage / 5) + 9) * kbM;
        target.vx = (target.x < this.x ? -1 : 1) * kb; 
        target.vy = kb * 0.35 + 6;
    }
}

let p1 = new Fighter("p1", 350, "#3498db", "1P"), p2 = new Fighter("p2", 710, "#e74c3c", "2P");

function setupStage() {
    const stage = document.getElementById("stage-select").value;
    const stageEl = document.getElementById("game-stage");
    platforms = [{x: 200, y: 120, w: 700}]; // メイン床
    if(stage === "small") platforms.push({x: 300, y: 280, w: 150}, {x: 650, y: 280, w: 150});
    if(stage === "battle") platforms.push({x: 300, y: 270, w: 150}, {x: 650, y: 270, w: 150}, {x: 475, y: 410, w: 150});
    
    stageEl.innerHTML = '<div id="overlay"></div>';
    platforms.forEach(p => {
        const div = document.createElement("div");
        div.className = "platform " + (p.y === 120 ? "main-floor" : "sub-platform");
        div.style.left = p.x + "px"; div.style.bottom = p.y + "px"; div.style.width = p.w + "px";
        div.style.height = (p.y === 120 ? "25px" : "12px");
        stageEl.appendChild(div);
    });
}

function startGame(m) {
    mode = m; setupStage();
    document.getElementById("menu").style.display = "none"; document.getElementById("game-container").style.display = "block";
    p1.reset(true); p2.reset(true); isRunning = true; loop();
}

function endGame(win) { isRunning = false; document.getElementById("result-screen").style.display = "flex"; document.getElementById("winner-text").innerText = win + " WINS!"; }

window.addEventListener("keydown", e => {
    keys[e.code] = true;
    if(!isRunning) return;
    // P1
    if(e.code === p1.controls.up && p1.jumps < 2) { p1.vy=12.5; p1.jumps++; }
    if(e.code === p1.controls.atk) p1.attack(p2, false);
    if(e.code === p1.controls.proj) p1.attack(p2, true);
    if(e.code === p1.controls.sp) p1.useSP(p2);
    // P2
    if(mode==="p2") {
        if(e.code === p2.controls.up && p2.jumps < 2) { p2.vy=12.5; p2.jumps++; }
        if(e.code === p2.controls.atk) p2.attack(p1, false);
        if(e.code === p2.controls.proj) p2.attack(p1, true);
        if(e.code === p2.controls.sp) p2.useSP(p1);
    }
});
window.addEventListener("keyup", e => keys[e.code] = false);

function loop() {
    if(!isRunning) return;
    
    if(keys[p1.controls.left]) { p1.vx -= 0.85; p1.dir = -1; } if(keys[p1.controls.right]) { p1.vx += 0.85; p1.dir = 1; }
    
    if(mode==="p2") {
        if(keys[p2.controls.left]) { p2.vx -= 0.85; p2.dir = -1; } if(keys[p2.controls.right]) { p2.vx += 0.85; p2.dir = 1; }
    } else {
        let diff = p1.x - p2.x;
        if(Math.abs(diff) > 80) { p2.vx += (diff>0?0.6:-0.6); p2.dir = diff>0?1:-1; }
        if(Math.abs(diff) < 300 && Math.random() < 0.04) p2.attack(p1, Math.abs(diff) > 130);
        if(Math.random() < 0.003) p2.useSP(p1);
        if(p2.y <= 120 && Math.random() < 0.05) { p2.vy = 12.5; p2.jumps++; }
    }

    p1.update(); p2.update();

    projectiles.forEach((p, i) => {
        p.x += p.vx; p.el.style.left = p.x+"px"; p.el.style.bottom = p.y+"px";
        let target = p.owner === p1 ? p2 : p1;
        if(Math.abs(p.x-target.x)<35 && Math.abs(p.y-(target.y+30))<40) {
            if(!target.isInvincible) p.owner.hit(target, p.pwr, 0.95);
            p.el.remove(); projectiles.splice(i, 1);
        } else if(p.x < -150 || p.x > 1250) { p.el.remove(); projectiles.splice(i, 1); }
    });

    items.forEach((it, i) => {
        it.y -= 2.2; it.el.style.left = it.x+"px"; it.el.style.bottom = it.y+"px";
        [p1, p2].forEach(p => {
            if(Math.abs(p.x-it.x)<35 && Math.abs(p.y-it.y)<45) {
                if(it.type === "heal") { p.damage = Math.max(0, p.damage - 25); showEffect("HEAL 25%"); }
                else { p.damage += 40; p.vx = (p.x < it.x ? -22 : 22); p.vy = 16; showEffect("BOOM!"); }
                it.el.remove(); items.splice(i, 1);
            }
        });
        if(it.y < -50) { it.el.remove(); items.splice(i, 1); }
    });

    if(document.getElementById("item-toggle").value === "on" && Math.random() < 0.0025) {
        const type = Math.random() > 0.65 ? "heal" : "bomb";
        const it = { x: 250 + Math.random()*600, y: 650, type, el: document.createElement("div") };
        it.el.className = "item"; it.el.style.background = type === "heal" ? "#2ecc71" : "#ff4757";
        document.getElementById("game-stage").appendChild(it.el); items.push(it);
    }
    requestAnimationFrame(loop);
}
function showEffect(t) { const o = document.getElementById("overlay"); o.innerText = t; setTimeout(()=>o.innerText="", 1200); }
</script>
</body>
</html>
