<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Browser Smash DX - Final</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; overflow: hidden; }
        
        /* メニュー画面 */
        #menu {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .char-select { margin: 20px; padding: 10px; font-size: 18px; }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #ff4757; color: white; border: none; border-radius: 5px; margin: 10px; }
        button:hover { background: #ff6b81; }

        /* ゲーム画面 */
        #game-container { display: none; }
        #ui-container { margin-top: 20px; display: flex; justify-content: center; gap: 50px; }
        .status-card { background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 10px; border: 2px solid #444; min-width: 150px; }
        .damage-percent { font-size: 48px; font-weight: bold; }
        
        #game-stage {
            width: 1000px; height: 600px; margin: 20px auto;
            background: linear-gradient(to bottom, #1e3c72, #2a5298);
            border: 5px solid #000; position: relative; overflow: hidden;
        }
        .main-platform { position: absolute; left: 200px; bottom: 150px; width: 600px; height: 40px; background: #444; border-bottom: 10px solid #222; }
        .player { position: absolute; width: 40px; height: 60px; }
        .head { width: 24px; height: 24px; background: #ffd1a4; border-radius: 50%; margin: 0 auto; border: 2px solid #000; }
        .body { width: 20px; height: 30px; margin: -2px auto; border: 2px solid #000; border-radius: 5px; }
        
        #overlay { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 80px; font-weight: bold; color: #ff0; text-shadow: 4px 4px 0 #000; pointer-events: none; z-index: 100; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>BROWSER SMASH DX</h1>
        <div>
            P1: <select id="char1" class="char-select">
                <option value="balanced">バランス</option>
                <option value="power">パワー</option>
                <option value="speed">スピード</option>
            </select>
            P2: <select id="char2" class="char-select">
                <option value="balanced">バランス</option>
                <option value="power">パワー</option>
                <option value="speed">スピード</option>
            </select>
        </div>
        <button onclick="initGame('com')">COM戦を開始</button>
        <button onclick="initGame('p2')">2P対戦を開始</button>
    </div>

    <div id="game-container">
        <div id="ui-container">
            <div class="status-card"><div>PLAYER 1</div><div id="p1-dmg" class="damage-percent">0%</div></div>
            <div class="status-card"><div>PLAYER 2</div><div id="p2-dmg" class="damage-percent">0%</div></div>
        </div>
        <div id="game-stage">
            <div id="overlay"></div>
            <div class="main-platform"></div>
            <div id="p1" class="player"></div>
            <div id="p2" class="player"></div>
        </div>
    </div>

<script>
const GRAVITY = 0.5;
const FRICTION = 0.85;
const GROUND_Y = 150;
let gameMode = "p2";
let isRunning = false;

class Fighter {
    constructor(id, x, color) {
        this.el = document.getElementById(id);
        this.id = id;
        this.startX = x;
        this.color = color;
        this.reset();
    }

    reset() {
        this.x = this.startX;
        this.y = GROUND_Y + 100;
        this.vx = 0;
        this.vy = 0;
        this.damage = 0;
        this.dir = (this.x < 500) ? 1 : -1;
        this.jumpCount = 0;
        this.isAttacking = false;
        this.updateStats("balanced");
    }

    updateStats(type) {
        if(type === "power") { this.atkPower = 1.5; this.moveSpeed = 0.6; this.bodyColor = "#f1c40f"; }
        else if(type === "speed") { this.atkPower = 0.7; this.moveSpeed = 1.2; this.bodyColor = "#2ecc71"; }
        else { this.atkPower = 1.0; this.moveSpeed = 0.8; this.bodyColor = this.color; }
        
        this.el.innerHTML = `
            <div class="head"></div>
            <div class="body" style="background: ${this.bodyColor}"></div>
        `;
    }

    update() {
        this.vy -= GRAVITY;
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= FRICTION;

        if (this.x + 40 > 200 && this.x < 800 && this.y <= GROUND_Y && this.vy <= 0 && this.y > GROUND_Y - 20) {
            this.y = GROUND_Y;
            this.vy = 0;
            this.jumpCount = 0;
        }

        if (this.x < -100 || this.x > 1100 || this.y < -100 || this.y > 800) {
            this.die();
        }
        this.draw();
    }

    draw() {
        this.el.style.left = this.x + "px";
        this.el.style.bottom = this.y + "px";
        this.el.style.transform = `scaleX(${this.dir})`;
        document.getElementById(`${this.id}-dmg`).innerText = Math.floor(this.damage) + "%";
    }

    jump() { if (this.jumpCount < 2) { this.vy = 12; this.jumpCount++; } }

    attack(target, isSpecial = false) {
        if (this.isAttacking) return;
        this.isAttacking = true;
        
        const range = isSpecial ? 80 : 50;
        const power = (isSpecial ? 15 : 7) * this.atkPower;
        
        if (Math.abs((this.x + (this.dir * 30)) - target.x) < range && Math.abs(this.y - target.y) < 50) {
            target.damage += power;
            const kb = (target.damage / 8) + (isSpecial ? 12 : 5);
            target.vx = this.dir * kb;
            target.vy = kb * 0.5;
        }
        setTimeout(() => this.isAttacking = false, isSpecial ? 400 : 200);
    }

    die() {
        showOverlay("KO!");
        this.reset();
    }
}

const p1 = new Fighter("p1", 300, "#3498db");
const p2 = new Fighter("p2", 660, "#e74c3c");
const keys = {};

window.addEventListener("keydown", e => {
    keys[e.code] = true;
    if (e.code === "KeyW") p1.jump();
    if (gameMode === "p2" && e.code === "ArrowUp") p2.jump();
    if (e.code === "KeyF") p1.attack(p2, false);
    if (e.code === "KeyG") p1.attack(p2, true);
    if (gameMode === "p2" && e.code === "Slash") p2.attack(p1, false);
    if (gameMode === "p2" && e.code === "Period") p2.attack(p1, true);
});
window.addEventListener("keyup", e => keys[e.code] = false);

function initGame(mode) {
    gameMode = mode;
    document.getElementById("menu").style.display = "none";
    document.getElementById("game-container").style.display = "block";
    
    p1.updateStats(document.getElementById("char1").value);
    p2.updateStats(document.getElementById("char2").value);
    
    if(!isRunning) {
        isRunning = true;
        gameLoop();
    }
}

function showOverlay(text) {
    const o = document.getElementById("overlay");
    o.innerText = text;
    setTimeout(() => o.innerText = "", 1000);
}

function gameLoop() {
    if (keys["KeyA"]) { p1.vx -= p1.moveSpeed; p1.dir = -1; }
    if (keys["KeyD"]) { p1.vx += p1.moveSpeed; p1.dir = 1; }

    if (gameMode === "p2") {
        if (keys["ArrowLeft"]) { p2.vx -= p2.moveSpeed; p2.dir = -1; }
        if (keys["ArrowRight"]) { p2.vx += p2.moveSpeed; p2.dir = 1; }
    } else {
        // 簡単なAI
        if (p2.x > p1.x + 50) { p2.vx -= 0.5; p2.dir = -1; }
        else if (p2.x < p1.x - 50) { p2.vx += 0.5; p2.dir = 1; }
        if (Math.random() < 0.02 && p2.y === GROUND_Y) p2.jump();
        if (Math.abs(p1.x - p2.x) < 60) p2.attack(p1, Math.random() < 0.1);
    }

    p1.update();
    p2.update();
    requestAnimationFrame(gameLoop);
}
</script>
</body>
</html>
