<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Browser Smash - Professional Edition</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; overflow: hidden; }
        #menu, #result-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #1a1a1a; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: #333; padding: 20px; border-radius: 15px; margin: 10px; text-align: left; }
        select { padding: 8px; font-size: 14px; border-radius: 5px; width: 150px; }
        button { background: #ff4757; color: white; cursor: pointer; font-size: 20px; padding: 12px 40px; border: none; border-radius: 8px; margin: 10px; }
        #controls-guide { margin-top: 15px; padding: 10px; background: rgba(0,0,0,0.5); border-radius: 10px; font-size: 13px; color: #ccc; }
        #game-container { display: none; }
        #ui-container { margin-top: 5px; display: flex; justify-content: center; gap: 20px; }
        .status-card { background: rgba(0,0,0,0.8); padding: 8px; border-radius: 10px; border: 2px solid #444; min-width: 150px; }
        .damage-percent { font-size: 28px; font-weight: bold; margin: 2px 0; }
        .sp-gauge { font-size: 10px; color: #ff0; margin-top: 2px; }
        #game-stage {
            width: 1100px; height: 600px; margin: 5px auto;
            background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
            border: 4px solid #000; position: relative; overflow: hidden;
        }
        .platform { position: absolute; background: #444; border-bottom: 5px solid #222; border-radius: 4px; z-index: 1; }
        .main-floor { background: #555; border-bottom: 10px solid #222; }
        .player { position: absolute; width: 40px; height: 60px; z-index: 10; transition: filter 0.1s; }
        .sword-obj { 
            position: absolute; width: 6px; height: 45px; background: #bdc3c7; 
            border: 1px solid #fff; left: 45px; bottom: 10px; transform-origin: bottom center;
            border-radius: 2px; transition: transform 0.1s;
        }
        .projectile { position: absolute; width: 16px; height: 16px; border-radius: 50%; box-shadow: 0 0 10px white; z-index: 15; }
        .item { position: absolute; width: 30px; height: 30px; z-index: 5; display: flex; justify-content: center; align-items: center; font-weight: bold; border-radius: 4px; }
        .crate { background: #8b4513; border: 2px solid #5d2e0a; color: #ffd700; box-shadow: inset 0 0 5px #000; }
        .bomb-timer { position: absolute; top: -10px; left: 0; height: 4px; background: red; width: 100%; border-radius: 2px; }
        .offscreen-indicator {
            position: absolute; padding: 5px 10px; border-radius: 15px; font-weight: bold; font-size: 12px;
            pointer-events: none; z-index: 50; display: none; border: 2px solid white;
        }
        #overlay { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); font-size: 60px; font-weight: bold; color: #ff0; text-shadow: 3px 3px 0 #000; pointer-events: none; z-index: 100; }
    </style>
</head>
<body>
    <div id="menu">
        <h1 style="color: #ff4757;">BROWSER SMASH <span style="font-size:12px; color:gold;">GOD MODE</span></h1>
        <div class="config-grid">
            <strong>【P1】</strong><strong>【P2】</strong>
            <div>タイプ: <select id="type1"><option value="fighter">格闘</option><option value="sword">剣</option><option value="gun">銃</option></select></div>
            <div>タイプ: <select id="type2"><option value="fighter">格闘</option><option value="sword">剣</option><option value="gun" selected>銃</option></select></div>
            <div>操作: <select id="style1" onchange="updateGuide()"><option value="wasd">WASD設定</option><option value="arrow">矢印設定</option></select></div>
            <div>操作: <select id="style2" onchange="updateGuide()"><option value="arrow" selected>矢印設定</option><option value="wasd">WASD設定</option></select></div>
            <strong>【設定】</strong><strong>【COMレベル】</strong>
            <div>アイテム出現: <select id="item-spawn"><option value="off" selected>OFF</option><option value="on">ON</option></select></div>
            <select id="com-lvl">
                <option value="1">Lv.1</option><option value="5">Lv.5</option><option value="8">Lv.8</option><option value="10" selected>Lv.10 (GOD)</option>
            </select>
            <strong>【ステージ】</strong>
            <div><select id="stage-select"><option value="random">ランダム</option><option value="final">終点</option><option value="small">小戦場</option><option value="battle" selected>戦場</option></select></div>
        </div>
        <div id="controls-guide"></div>
        <div style="margin-top:10px;"><button onclick="startGame('com')">VS COM</button><button onclick="startGame('p2')">VS 2P</button></div>
    </div>
    <div id="result-screen" style="display:none;"><h1 id="winner-text"></h1><button onclick="location.reload()">タイトルへ</button></div>
    <div id="game-container">
        <div id="ui-container">
            <div class="status-card">P1 <div id="p1-val" class="damage-percent">0%</div><div id="p1-sub">●●●</div><div id="p1-sp" class="sp-gauge">SP: READY</div></div>
            <div class="status-card">P2 <div id="p2-val" class="damage-percent">0%</div><div id="p2-sub">●●●</div><div id="p2-sp" class="sp-gauge">SP: READY</div></div>
        </div>
        <div id="game-stage">
            <div id="p1-ind" class="offscreen-indicator">P1</div>
            <div id="p2-ind" class="offscreen-indicator">P2</div>
            <div id="overlay"></div>
        </div>
    </div>

<script>
const GRAVITY = 0.58, FRICTION = 0.90, MOVE_ACCEL = 1.1;
let mode = "p2", isRunning = false, projectiles = [], items = [], keys = {}, platforms = [];

function updateGuide() {
    const s1 = document.getElementById("style1").value;
    const s2 = document.getElementById("style2").value;
    const guide = (s) => s === "wasd" ? "W:跳 A:左 D:右 F:攻 G:SP" : "↑:跳 ←:左 →:右 .:攻 ,:SP";
    document.getElementById("controls-guide").innerHTML = `P1 [${s1.toUpperCase()}]: ${guide(s1)}<br>P2 [${s2.toUpperCase()}]: ${guide(s2)}`;
}
updateGuide();

const getControls = (id) => {
    const style = document.getElementById(id==="p1"?"style1":"style2").value;
    return style === "wasd" ? { up: "KeyW", left: "KeyA", right: "KeyD", atk: "KeyF", sp: "KeyG" } : { up: "ArrowUp", left: "ArrowLeft", right: "ArrowRight", atk: "Period", sp: "Comma" };
};

class Fighter {
    constructor(id, x, color, label) {
        this.id = id; this.el = null; this.startX = x; this.color = color; this.label = label;
        this.stock = 3; this.spReady = true; this.damage = 0;
        this.jumps = 0; this.isGrabbing = false; this.ledgeTimer = 0;
    }
    reset(full) {
        if(full) this.stock = 3;
        this.damage = 0; this.isGrabbing = false;
        this.x = this.startX; this.y = 350; this.oldY = 350; this.vx = 0; this.vy = 0;
        this.dir = (this.x < 550) ? 1 : -1; this.jumps = 0; this.isAtk = false;
        this.controls = getControls(this.id);
        this.isInvincible = true; setTimeout(() => this.isInvincible = false, 1500);
        this.type = document.getElementById(this.id==="p1"?"type1":"type2").value;
        const stats = { fighter: [15, 0, 0, 400], sword: [13, 8, 15, 300], gun: [9, 9, 22, 140] };
        [this.meleeP, this.projP, this.projS, this.cd] = stats[this.type];
        if(!this.el) { this.el = document.createElement("div"); this.el.id = this.id; document.getElementById("game-stage").appendChild(this.el); }
        this.el.className = `player type-${this.type}`;
        this.el.innerHTML = `<div style="position:absolute;top:-25px;width:100%;text-align:center;font-size:11px;">${this.label}</div>
                             <div style="width:20px;height:20px;background:#ffd1a4;border-radius:50%;margin:0 auto;border:2px solid #000;"></div>
                             <div style="width:22px;height:30px;background:${this.color};margin:-2px auto;border:2px solid #000;border-radius:4px;"></div>
                             ${this.type==='sword' ? '<div class="sword-obj" id="'+this.id+'-sword"></div>' : ''}`;
        this.ind = document.getElementById(this.id + "-ind");
        this.ind.style.backgroundColor = this.color;
    }
    jump() {
        if(this.isGrabbing) {
            this.isGrabbing = false; this.vy = 14; this.vx = (this.x < 550) ? 4 : -4;
            this.jumps = 1; this.ledgeTimer = 60; return;
        }
        if(this.jumps < 2) { this.vy = 13.5; this.jumps++; }
    }
    update() {
        if (this.ledgeTimer > 0) this.ledgeTimer--;
        if (this.isGrabbing) {
            this.vx = 0; this.vy = 0; this.jumps = 0;
            this.el.style.left = this.x + "px"; this.el.style.bottom = (this.y - 20) + "px";
            return;
        }
        this.oldY = this.y; this.vy -= GRAVITY; this.x += this.vx; this.y += this.vy; this.vx *= FRICTION;

        if (this.vy < 2 && this.ledgeTimer <= 0) {
            const ledgeY = 120;
            if (Math.abs(this.y - ledgeY) < 15) {
                if (Math.abs(this.x - 180) < 15) { this.x = 175; this.y = ledgeY; this.isGrabbing = true; this.dir = 1; }
                else if (Math.abs(this.x - 900) < 15) { this.x = 895; this.y = ledgeY; this.isGrabbing = true; this.dir = -1; }
            }
        }
        platforms.forEach(p => {
            if (this.vy <= 0 && (this.x + 25 > p.x && this.x + 5 < p.x + p.w)) {
                if (this.oldY >= p.y && this.y <= p.y) { this.y = p.y; this.vy = 0; this.jumps = 0; }
            }
        });
        if (this.x < -400 || this.x > 1500 || this.y < -400 || this.y > 1200) this.out();
        
        this.el.style.left = this.x + "px"; this.el.style.bottom = this.y + "px";
        this.el.style.transform = `scaleX(${this.dir})`;
        this.el.style.opacity = (this.isInvincible || this.isGrabbing) ? 0.5 : 1;
        this.updateIndicator();

        document.getElementById(this.id+"-val").innerText = Math.floor(this.damage) + "%";
        document.getElementById(this.id+"-sub").innerText = "●".repeat(Math.max(0, this.stock));
        document.getElementById(this.id+"-sp").innerText = this.spReady ? "SP: READY" : "SP: CHARGING";
        document.getElementById(this.id+"-sp").style.color = this.spReady ? "#ff0" : "#555";
    }

    updateIndicator() {
        const stageW = 1100, stageH = 600;
        let isOff = false, ix = this.x, iy = 600 - this.y - 60;
        if (this.x < 0) { ix = 10; isOff = true; }
        else if (this.x > stageW - 40) { ix = stageW - 70; isOff = true; }
        if (this.y > stageH - 60) { iy = 10; isOff = true; }
        if (isOff) {
            this.ind.style.display = "block";
            this.ind.style.left = Math.max(10, Math.min(stageW - 80, ix)) + "px";
            this.ind.style.top = Math.max(10, Math.min(stageH - 40, iy)) + "px";
        } else { this.ind.style.display = "none"; }
    }

    out() { this.stock--; if(this.stock <= 0) endGame(this.id==="p1"?"P2":"P1"); else { showEffect("K.O."); this.reset(false); } }
    
    attack(target) {
        if(this.isAtk || this.isGrabbing) return;
        this.isAtk = true; this.dir = (target.x > this.x) ? 1 : -1;
        if(this.type === 'sword') {
            const sw = document.getElementById(this.id + "-sword"); if(sw) sw.style.transform = "rotate(90deg)";
            if(Math.abs(this.x - target.x) < 110 && Math.abs(this.y - target.y) < 70) this.hit(target, this.meleeP, 1.95);
            setTimeout(() => { if(sw) sw.style.transform = "rotate(0deg)"; }, 150);
        } else if(this.type === "fighter") {
            if(Math.abs(this.x - target.x) < 90 && Math.abs(this.y - target.y) < 65) this.hit(target, this.meleeP, 1.75);
        } else { this.fireProjectile(this.projP, this.projS); }

        // 木箱の破壊判定
        items.forEach(it => {
            if(it.type === "crate" && Math.abs(this.x - it.x) < 80 && Math.abs(this.y - it.y) < 80) {
                breakCrate(it);
            }
        });

        setTimeout(()=>this.isAtk=false, this.cd);
    }

    fireProjectile(pwr, speed, vy=0, gravity=0) {
        const p = { x: this.x + (this.dir*30), y: this.y + 25, vx: this.dir*speed, vy: vy, grav: gravity, owner: this, pwr, el: document.createElement("div") };
        p.el.className = "projectile"; 
        p.el.style.background = gravity > 0 ? "#7f8c8d" : (this.type==="sword"?"#00ffff":"#ffff00");
        if(gravity > 0) { p.el.style.width = "8px"; p.el.style.height = "25px"; p.el.style.borderRadius = "2px"; }
        document.getElementById("game-stage").appendChild(p.el); projectiles.push(p);
    }

    useSP(target) {
        if(!this.spReady || this.isGrabbing) return; 
        this.spReady = false; 
        if(this.type === "fighter") {
            showEffect("!!"); this.vx *= 0.2; this.el.style.filter = "brightness(3) contrast(2) drop-shadow(0 0 15px #f00)";
            setTimeout(() => {
                showEffect("ULTIMATE!"); this.el.style.filter = ""; this.vx = this.dir * 42;
                setTimeout(() => { if(Math.abs(this.x - target.x) < 120 && Math.abs(this.y - target.y) < 90) this.hit(target, 38, 3.0); }, 100);
            }, 250); 
        } else if(this.type === "sword") {
            showEffect("ULTIMATE!"); for(let i=0; i<4; i++) setTimeout(() => this.fireProjectile(14, 20), i*120);
        } else {
            showEffect("ULTIMATE!"); for(let i=0; i<16; i++) setTimeout(() => this.fireProjectile(8, 30), i*40);
        }
        setTimeout(() => this.spReady = true, 9000);
    }

    hit(target, pwr, kbM) { if(target.isInvincible || target.isGrabbing) return; target.damage += pwr; const kb = ((target.damage / 4) + 12) * kbM; target.vx = (target.x < this.x ? -1 : 1) * kb; target.vy = kb * 0.38 + 7; }
}

function breakCrate(it) {
    const types = ["bomb", "heal", "spear"];
    const newType = types[Math.floor(Math.random() * types.length)];
    it.type = newType;
    it.el.classList.remove("crate");
    if(newType === "bomb") {
        it.el.style.background = "#333"; it.el.style.borderRadius = "50%"; it.el.innerText = "💣";
        it.timer = 180; // 約3秒
        it.timerEl = document.createElement("div"); it.timerEl.className = "bomb-timer";
        it.el.appendChild(it.timerEl);
    } else if(newType === "heal") {
        it.el.style.background = "#2ecc71"; it.el.innerText = "♥";
    } else {
        it.el.style.background = "#7f8c8d"; it.el.innerText = "➹";
    }
}

function spawnItem() {
    if(document.getElementById("item-spawn").value === "off") return;
    const sX = 250 + Math.random()*600;
    const it = { x: sX, y: 700, vy: 0, type: "crate", el: document.createElement("div") };
    it.el.className = "item crate"; it.el.innerText = "📦";
    document.getElementById("game-stage").appendChild(it.el);
    items.push(it);
}

function loop() {
    if(!isRunning) return;
    if(!p1.isGrabbing) { if(keys[p1.controls.left]) { p1.vx -= MOVE_ACCEL; p1.dir = -1; } if(keys[p1.controls.right]) { p1.vx += MOVE_ACCEL; p1.dir = 1; } }
    
    // COM思考ルーチン (GOD)
    if(mode==="com") {
        const lvl = parseInt(document.getElementById("com-lvl").value);
        const dist = Math.abs(p1.x - p2.x), yDist = Math.abs(p1.y - p2.y);
        if (p2.isGrabbing) { if (Math.random() < 0.1) p2.jump(); }
        else if (p2.x < 150 || p2.x > 950 || p2.y < 100) { p2.vx += (p2.x < 550 ? 1.2 : -1.2); if (p2.vy < 0) p2.jump(); }
        else {
            if (lvl === 10 && p1.isAtk && dist < 150 && Math.random() < 0.7) { if (p2.jumps < 2) p2.jump(); p2.vx += (p2.x < p1.x ? -2 : 2); }
            if(dist < 140 && yDist < 80 && Math.random() < (0.05 * lvl)) p2.attack(p1);
            let tX = p1.x + (p1.x > p2.x ? -20 : 20); if (lvl === 10) tX = p1.x + (p1.vx * 10);
            p2.vx += (p2.x < tX ? 0.7 + lvl*0.08 : -0.7 - lvl*0.08);
            if (p1.y > p2.y + 50 || (lvl === 10 && Math.random() < 0.03)) p2.jump();
            if(lvl >= 8 && p2.spReady && dist < 400 && Math.random() < 0.05) p2.useSP(p1);
        }
    }

    p1.update(); p2.update();

    // 飛び道具更新（やり対応）
    projectiles.forEach((p, i) => {
        if(p.grav > 0) { p.vy -= p.grav; p.y += p.vy; p.el.style.transform = `rotate(${Math.atan2(-p.vy, p.vx*p.owner.dir)}rad)`; }
        p.x += p.vx; p.el.style.left = p.x+"px"; p.el.style.bottom = p.y+"px";
        let target = p.owner === p1 ? p2 : p1;
        if(Math.abs(p.x-target.x)<35 && Math.abs(p.y-(target.y+30))<40) {
            if(!target.isInvincible && !target.isGrabbing) p.owner.hit(target, p.pwr, 1.2);
            p.el.remove(); projectiles.splice(i, 1);
        } else if(p.x < -500 || p.x > 1600 || p.y < -100) { p.el.remove(); projectiles.splice(i, 1); }
        // 箱への当たり判定
        items.forEach(it => {
            if(it.type === "crate" && Math.abs(p.x - it.x) < 30 && Math.abs(p.y - it.y) < 30) {
                breakCrate(it); p.el.remove(); projectiles.splice(i, 1);
            }
        });
    });

    // アイテム出現タイミング (15~30秒)
    if(Math.random() < 0.001) spawnItem();

    // アイテム更新
    items.forEach((it, i) => {
        it.vy -= 0.2; it.y += it.vy; 
        platforms.forEach(pl => { if(it.vy <= 0 && it.x > pl.x-20 && it.x < pl.x+pl.w && it.oldY >= pl.y && it.y <= pl.y) { it.y = pl.y; it.vy = 0; } });
        it.oldY = it.y; it.el.style.left = it.x+"px"; it.el.style.bottom = it.y+"px";

        if(it.type === "bomb") {
            it.timer--; it.timerEl.style.width = (it.timer/180*100) + "%";
            if(it.timer <= 0) {
                [p1, p2].forEach(p => { if(Math.abs(p.x-it.x)<150 && Math.abs(p.y-it.y)<150) { p.damage += 40; p.vx = (p.x < it.x ? -30 : 30); p.vy = 20; } });
                showEffect("BOOM!"); it.el.remove(); items.splice(i, 1); return;
            }
        }
        
        [p1, p2].forEach(p => {
            if(it.type !== "crate" && it.type !== "bomb" && Math.abs(p.x-it.x)<40 && Math.abs(p.y-it.y)<50) {
                if(it.type === "heal") {
                    let amt = p.damage < 100 ? 25 : (p.damage < 200 ? 50 : 75);
                    p.damage = Math.max(0, p.damage - amt); showEffect("RECOVERY!");
                } else if(it.type === "spear") {
                    p.fireProjectile(20, 15, 12, 0.4); // 槍を投げる
                }
                it.el.remove(); items.splice(i, 1);
            }
        });
        if(it.y < -100) { it.el.remove(); items.splice(i, 1); }
    });
    requestAnimationFrame(loop);
}

// 他の関数（startGame, setupStageなど）は以前と同じ
let p1_inst = p1, p2_inst = p2;
function startGame(m) { mode = m; projectiles = []; items = []; setupStage(); document.getElementById("menu").style.display = "none"; document.getElementById("game-container").style.display = "block"; p1.reset(true); p2.reset(true); isRunning = true; loop(); }
function endGame(win) { isRunning = false; document.getElementById("result-screen").style.display = "flex"; document.getElementById("winner-text").innerText = win + " WINS!"; }
function showEffect(t) { const o = document.getElementById("overlay"); o.innerText = t; setTimeout(()=>o.innerText="", 1200); }
</script>
</body>
</html>
