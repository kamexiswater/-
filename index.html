<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Browser Smash DX - Fixed</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; overflow: hidden; }
        
        /* メニュー画面 */
        #menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #1a1a1a; z-index: 1000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .char-select { margin: 10px; padding: 10px; font-size: 18px; border-radius: 5px; }
        button { padding: 15px 40px; font-size: 22px; cursor: pointer; background: #ff4757; color: white; border: none; border-radius: 8px; margin: 15px; transition: 0.2s; }
        button:hover { background: #ff6b81; transform: scale(1.05); }

        /* ゲーム画面（初期は非表示） */
        #game-container { display: none; }
        #ui-container { margin-top: 20px; display: flex; justify-content: center; gap: 50px; }
        .status-card { background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 10px; border: 2px solid #444; min-width: 150px; }
        .damage-percent { font-size: 48px; font-weight: bold; color: white; }
        
        #game-stage {
            width: 1000px; height: 600px; margin: 20px auto;
            background: linear-gradient(to bottom, #1e3c72, #2a5298);
            border: 5px solid #000; position: relative; overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .main-platform { position: absolute; left: 200px; bottom: 150px; width: 600px; height: 40px; background: #444; border-bottom: 10px solid #222; }
        .player { position: absolute; width: 40px; height: 60px; pointer-events: none; }
        .head { width: 24px; height: 24px; background: #ffd1a4; border-radius: 50%; margin: 0 auto; border: 2px solid #000; }
        .body { width: 22px; height: 32px; margin: -2px auto; border: 2px solid #000; border-radius: 5px; }
        
        #overlay { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 100px; font-weight: bold; color: #ff0; text-shadow: 5px 5px 0 #000; pointer-events: none; z-index: 100; font-style: italic; }
    </style>
</head>
<body>

    <div id="menu">
        <h1 style="font-size: 50px; margin-bottom: 30px; color: #ff4757;">BROWSER SMASH DX</h1>
        <div style="background: #333; padding: 20px; border-radius: 15px;">
            <div style="margin-bottom: 15px;">
                P1 キャラ: 
                <select id="char1" class="char-select">
                    <option value="balanced">バランス</option>
                    <option value="power">パワー (重/強)</option>
                    <option value="speed">スピード (軽/速)</option>
                </select>
            </div>
            <div>
                P2 キャラ: 
                <select id="char2" class="char-select">
                    <option value="balanced">バランス</option>
                    <option value="power">パワー (重/強)</option>
                    <option value="speed">スピード (軽/速)</option>
                </select>
            </div>
        </div>
        <div style="margin-top: 30px;">
            <button onclick="initGame('com')">1P vs COM</button>
            <button onclick="initGame('p2')">1P vs 2P</button>
        </div>
        <p style="color: #888; margin-top: 20px;">P1: WASD / F,G | P2: Arrow / L,K</p>
    </div>

    <div id="game-container">
        <div id="ui-container">
            <div class="status-card"><div>PLAYER 1</div><div id="p1-dmg" class="damage-percent">0%</div></div>
            <div class="status-card"><div>PLAYER 2</div><div id="p2-dmg" class="damage-percent">0%</div></div>
        </div>
        <div id="game-stage">
            <div id="overlay"></div>
            <div class="main-platform"></div>
            <div id="p1" class="player"></div>
            <div id="p2" class="player"></div>
        </div>
    </div>

<script>
// ゲーム定数
const GRAVITY = 0.5;
const FRICTION = 0.85;
const GROUND_Y = 150;
let gameMode = "p2";
let isRunning = false;
const keys = {};

class Fighter {
    constructor(id, startX, defaultColor) {
        this.id = id;
        this.el = document.getElementById(id);
        this.startX = startX;
        this.defaultColor = defaultColor;
        this.reset();
    }

    reset() {
        this.x = this.startX;
        this.y = 400; // 上から降ってくる
        this.vx = 0;
        this.vy = 0;
        this.damage = 0;
        this.dir = (this.x < 500) ? 1 : -1;
        this.jumpCount = 0;
        this.isAttacking = false;
        this.updateVisuals();
    }

    updateVisuals() {
        const type = document.getElementById(this.id === "p1" ? "char1" : "char2").value;
        if(type === "power") { this.atkPower = 1.6; this.moveSpeed = 0.6; this.bodyColor = "#f1c40f"; }
        else if(type === "speed") { this.atkPower = 0.7; this.moveSpeed = 1.3; this.bodyColor = "#2ecc71"; }
        else { this.atkPower = 1.0; this.moveSpeed = 0.9; this.bodyColor = this.defaultColor; }
        
        this.el.innerHTML = `
            <div class="head"></div>
            <div class="body" style="background: ${this.bodyColor}"></div>
        `;
    }

    update() {
        this.vy -= GRAVITY;
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= FRICTION;

        // 床判定
        if (this.x + 30 > 200 && this.x < 770 && this.y <= GROUND_Y && this.vy <= 0 && this.y > GROUND_Y - 20) {
            this.y = GROUND_Y;
            this.vy = 0;
            this.jumpCount = 0;
        }

        // 撃墜判定
        if (this.x < -100 || this.x > 1100 || this.y < -150 || this.y > 900) {
            this.die();
        }
        this.draw();
    }

    draw() {
        this.el.style.left = this.x + "px";
        this.el.style.bottom = this.y + "px";
        this.el.style.transform = `scaleX(${this.dir})`;
        document.getElementById(`${this.id}-dmg`).innerText = Math.floor(this.damage) + "%";
    }

    jump() { 
        if (this.jumpCount < 2) { 
            this.vy = 12; 
            this.jumpCount++; 
        } 
    }

    attack(target, isSpecial = false) {
        if (this.isAttacking) return;
        this.isAttacking = true;
        
        const range = isSpecial ? 90 : 60;
        const power = (isSpecial ? 18 : 8) * this.atkPower;
        
        // 簡易当たり判定
        const distX = Math.abs((this.x + (this.dir * 20)) - target.x);
        const distY = Math.abs(this.y - target.y);
        
        if (distX < range && distY < 50) {
            target.damage += power;
            const kb = (target.damage / 7) + (isSpecial ? 15 : 6);
            target.vx = this.dir * kb;
            target.vy = kb * 0.4 + 2;
        }
        
        setTimeout(() => this.isAttacking = false, isSpecial ? 500 : 250);
    }

    die() {
        showOverlay("K.O.");
        this.reset();
    }
}

let p1, p2;

function initGame(mode) {
    gameMode = mode;
    
    // クラスを初期化
    p1 = new Fighter("p1", 300, "#3498db");
    p2 = new Fighter("p2", 660, "#e74c3c");

    // UI切り替え
    document.getElementById("menu").style.display = "none";
    document.getElementById("game-container").style.display = "block";
    
    if(!isRunning) {
        isRunning = true;
        gameLoop();
    }
}

// キー入力管理
window.addEventListener("keydown", e => {
    keys[e.code] = true;
    if (e.code === "KeyW") p1.jump();
    if (e.code === "KeyF") p1.attack(p2, false);
    if (e.code === "KeyG") p1.attack(p2, true);

    if (gameMode === "p2") {
        if (e.code === "ArrowUp") p2.jump();
        if (e.code === "KeyL") p2.attack(p1, false);
        if (e.code === "KeyK") p2.attack(p1, true);
    }
});
window.addEventListener("keyup", e => keys[e.code] = false);

function showOverlay(text) {
    const o = document.getElementById("overlay");
    o.innerText = text;
    setTimeout(() => o.innerText = "", 1500);
}

function gameLoop() {
    if (!isRunning) return;

    // P1 移動
    if (keys["KeyA"]) { p1.vx -= p1.moveSpeed; p1.dir = -1; }
    if (keys["KeyD"]) { p1.vx += p1.moveSpeed; p1.dir = 1; }

    // P2 移動（2P または COM）
    if (gameMode === "p2") {
        if (keys["ArrowLeft"]) { p2.vx -= p2.moveSpeed; p2.dir = -1; }
        if (keys["ArrowRight"]) { p2.vx += p2.moveSpeed; p2.dir = 1; }
    } else {
        // COM AI
        const diff = p1.x - p2.x;
        if (Math.abs(diff) > 40) {
            p2.vx += (diff > 0 ? 1 : -1) * p2.moveSpeed * 0.5;
            p2.dir = diff > 0 ? 1 : -1;
        }
        if (Math.abs(diff) < 70 && Math.random() < 0.05) p2.attack(p1, Math.random() < 0.2);
        if (p1.y > p2.y + 50 && Math.random() < 0.02) p2.jump();
        if (p2.y < GROUND_Y - 20 && Math.random() < 0.05) p2.jump(); // 復帰ジャンプ
    }

    p1.update();
    p2.update();

    requestAnimationFrame(gameLoop);
}
</script>
</body>
</html>
