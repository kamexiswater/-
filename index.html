<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Browser Smash - Pro Recovery Edition</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; overflow: hidden; }
        #menu, #result-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #1a1a1a; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: #333; padding: 20px; border-radius: 15px; margin: 10px; text-align: left; }
        select { padding: 8px; font-size: 14px; border-radius: 5px; width: 150px; }
        button { background: #ff4757; color: white; cursor: pointer; font-size: 20px; padding: 12px 40px; border: none; border-radius: 8px; margin: 10px; }
        #controls-guide { margin-top: 15px; padding: 10px; background: rgba(0,0,0,0.5); border-radius: 10px; font-size: 13px; color: #ccc; }
        #game-container { display: none; }
        #ui-container { margin-top: 5px; display: flex; justify-content: center; gap: 20px; }
        .status-card { background: rgba(0,0,0,0.8); padding: 8px; border-radius: 10px; border: 2px solid #444; min-width: 150px; }
        .damage-percent { font-size: 28px; font-weight: bold; margin: 2px 0; }
        .sp-gauge { font-size: 10px; color: #ff0; margin-top: 2px; }
        #game-stage {
            width: 1100px; height: 600px; margin: 5px auto;
            background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
            border: 4px solid #000; position: relative; overflow: hidden;
        }
        .platform { position: absolute; background: #444; border-bottom: 5px solid #222; border-radius: 4px; z-index: 1; }
        .player { position: absolute; width: 40px; height: 60px; z-index: 10; transition: filter 0.1s; }
        .projectile { position: absolute; width: 16px; height: 16px; border-radius: 50%; box-shadow: 0 0 10px white; z-index: 15; }
        .item { position: absolute; width: 34px; height: 34px; z-index: 5; display: flex; justify-content: center; align-items: center; font-weight: bold; border-radius: 4px; font-size: 20px; }
        .crate { background: #8b4513; border: 2px solid #5d2e0a; color: #ffd700; }
        .bomb-timer { position: absolute; top: -8px; left: 0; height: 4px; background: #ff0000; width: 100%; }
        .explosion-range { 
            position: absolute; border-radius: 50%; background: rgba(255, 0, 0, 0.2); 
            border: 2px dashed rgba(255, 255, 255, 0.5); pointer-events: none; z-index: 2;
            transform: translate(-50%, 50%);
        }
        #overlay { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); font-size: 60px; font-weight: bold; color: #ff0; text-shadow: 3px 3px 0 #000; pointer-events: none; z-index: 100; }
    </style>
</head>
<body>
    <div id="menu">
        <h1 style="color: #ff4757;">BROWSER SMASH <span style="font-size:12px; color:gold;">GOD RECOVERY</span></h1>
        <div class="config-grid">
            <strong>【P1】</strong><strong>【P2】</strong>
            <div>タイプ: <select id="type1"><option value="fighter">格闘</option><option value="sword">剣</option><option value="gun">銃</option></select></div>
            <div>タイプ: <select id="type2"><option value="fighter">格闘</option><option value="sword" selected>剣</option><option value="gun">銃</option></select></div>
            <div>操作: <select id="style1" onchange="updateGuide()"><option value="wasd">WASD設定</option><option value="arrow">矢印設定</option></select></div>
            <div>操作: <select id="style2" onchange="updateGuide()"><option value="arrow" selected>矢印設定</option><option value="wasd">WASD設定</option></select></div>
            <strong>【設定】</strong><strong>【難易度】</strong>
            <div>アイテム: <select id="item-spawn"><option value="on" selected>ON</option><option value="off">OFF</option></select></div>
            <div>COMレベル: <select id="com-lvl"><option value="max" selected>Lv.MAX (不沈)</option></select></div>
        </div>
        <div id="controls-guide"></div>
        <div style="margin-top:10px;"><button onclick="startGame('com')">VS COM (GOD)</button><button onclick="startGame('p2')">VS 2P</button></div>
    </div>
    <div id="result-screen" style="display:none;"><h1 id="winner-text"></h1><button onclick="location.reload()">タイトルへ</button></div>
    <div id="game-container">
        <div id="ui-container">
            <div class="status-card">P1 <div id="p1-val" class="damage-percent">0%</div><div id="p1-sub">●●●</div><div id="p1-sp" class="sp-gauge">BOMB: READY</div></div>
            <div class="status-card">P2 <div id="p2-val" class="damage-percent">0%</div><div id="p2-sub">●●●</div><div id="p2-sp" class="sp-gauge">BOMB: READY</div></div>
        </div>
        <div id="game-stage">
            <div id="overlay"></div>
        </div>
    </div>

<script>
const GRAVITY = 0.58, FRICTION = 0.90, MOVE_ACCEL = 1.1;
let mode = "p2", isRunning = false, projectiles = [], items = [], keys = {}, platforms = [];

function updateGuide() {
    const s1 = document.getElementById("style1").value;
    const s2 = document.getElementById("style2").value;
    const guide = (s) => s === "wasd" ? "W:跳 A:左 D:右 F:攻 G:爆弾" : "↑:跳 ←:左 →:右 .:攻 ,:爆弾";
    document.getElementById("controls-guide").innerHTML = `P1 [${s1.toUpperCase()}]: ${guide(s1)}<br>P2 [${s2.toUpperCase()}]: ${guide(s2)}`;
}
updateGuide();

const getControls = (id) => {
    const style = document.getElementById(id==="p1"?"style1":"style2").value;
    return style === "wasd" ? { up: "KeyW", left: "KeyA", right: "KeyD", atk: "KeyF", sp: "KeyG" } : { up: "ArrowUp", left: "ArrowLeft", right: "ArrowRight", atk: "Period", sp: "Comma" };
};

class Fighter {
    constructor(id, x, color, label) {
        this.id = id; this.el = null; this.startX = x; this.color = color; this.label = label;
        this.reset(true);
    }
    reset(full) {
        if(full) this.stock = 3;
        this.damage = 0; this.x = this.startX; this.y = 350; 
        this.oldY = 350; this.vx = 0; this.vy = 0; this.dir = (this.x < 550) ? 1 : -1;
        this.jumps = 0; this.isAtk = false; this.spReady = true;
        this.controls = getControls(this.id);
        this.isInvincible = true; setTimeout(() => this.isInvincible = false, 1500);
        this.type = document.getElementById(this.id==="p1"?"type1":"type2").value;
        const stats = { fighter: [15, 350], sword: [13, 280], gun: [9, 120] };
        [this.meleeP, this.cd] = stats[this.type];
        if(!this.el) { this.el = document.createElement("div"); this.el.id = this.id; document.getElementById("game-stage").appendChild(this.el); }
        this.el.className = `player type-${this.type}`;
        this.el.innerHTML = `<div style="position:absolute;top:-25px;width:100%;text-align:center;font-size:11px;">${this.label}</div>
                             <div style="width:20px;height:20px;background:#ffd1a4;border-radius:50%;margin:0 auto;border:2px solid #000;"></div>
                             <div style="width:22px;height:30px;background:${this.color};margin:-2px auto;border:2px solid #000;border-radius:4px;"></div>`;
    }
    jump() { 
        if(this.jumps < 2) { 
            this.vy = 14.5; // 少し強化
            this.jumps++; 
        } 
    }
    
    update() {
        this.oldY = this.y; this.vy -= GRAVITY; this.x += this.vx; this.y += this.vy; this.vx *= FRICTION;
        platforms.forEach(p => {
            if (this.vy <= 0 && (this.x + 25 > p.x && this.x + 5 < p.x + p.w)) {
                if (this.oldY >= p.y && this.y <= p.y) { this.y = p.y; this.vy = 0; this.jumps = 0; }
            }
        });
        if (this.x < -300 || this.x > 1400 || this.y < -400) this.out();
        this.el.style.left = this.x + "px"; this.el.style.bottom = this.y + "px";
        this.el.style.transform = `scaleX(${this.dir})`;
        this.el.style.opacity = this.isInvincible ? 0.5 : 1;
        document.getElementById(this.id+"-val").innerText = Math.floor(this.damage) + "%";
        document.getElementById(this.id+"-sub").innerText = "●".repeat(Math.max(0, this.stock));
    }

    out() { this.stock--; if(this.stock <= 0) endGame(this.id==="p1"?"P2":"P1"); else { showEffect("K.O."); this.reset(false); } }

    attack(target) {
        if(this.isAtk) return;
        this.isAtk = true; this.dir = (target.x > this.x) ? 1 : -1;
        if(this.type === "gun") { this.fireProjectile(9, 22); }
        else {
            const reach = this.type === "sword" ? 110 : 80;
            if(Math.abs(this.x - target.x) < reach && Math.abs(this.y - target.y) < 70) this.hit(target, this.meleeP, 1.8);
        }
        items.forEach(it => { if(it.type === "crate" && Math.abs(this.x - it.x) < 80) breakCrate(it); });
        setTimeout(()=>this.isAtk=false, this.cd);
    }

    throwBomb() {
        if(!this.spReady) return;
        this.spReady = false;
        const bomb = { 
            x: this.x + (this.dir * 20), y: this.y + 40, vx: this.dir * 8, vy: 10, 
            type: "bomb", timer: 150, range: 170, el: document.createElement("div"), oldY: 0
        };
        bomb.el.className = "item"; bomb.el.style.background = "#333"; bomb.el.style.borderRadius = "50%"; bomb.el.innerText = "💣";
        bomb.timerEl = document.createElement("div"); bomb.timerEl.className = "bomb-timer";
        bomb.el.appendChild(bomb.timerEl);
        document.getElementById("game-stage").appendChild(bomb.el);
        items.push(bomb);
        setTimeout(() => this.spReady = true, 4000);
    }

    fireProjectile(pwr, speed) {
        const p = { x: this.x + (this.dir*30), y: this.y + 25, vx: this.dir*speed, owner: this, pwr, el: document.createElement("div") };
        p.el.className = "projectile"; p.el.style.background = "#ffff00";
        document.getElementById("game-stage").appendChild(p.el); projectiles.push(p);
    }

    hit(target, pwr, kbM) { 
        if(target.isInvincible) return; 
        target.damage += pwr; 
        const kb = ((target.damage / 5) + 12) * kbM; 
        target.vx = (target.x < this.x ? -1 : 1) * kb; 
        target.vy = kb * 0.35 + 6; 
    }
}

let p1 = new Fighter("p1", 300, "#3498db", "1P"), p2 = new Fighter("p2", 800, "#e74c3c", "2P");

function setupStage() {
    platforms = [{x: 150, y: 120, w: 800}, {x: 300, y: 280, w: 200}, {x: 600, y: 280, w: 200}];
    const stageEl = document.getElementById("game-stage");
    stageEl.innerHTML = '<div id="overlay"></div>';
    platforms.forEach(p => {
        const div = document.createElement("div"); div.className = "platform";
        div.style.left = p.x + "px"; div.style.bottom = p.y + "px"; div.style.width = p.w + "px"; div.style.height = "15px";
        stageEl.appendChild(div);
    });
}

function breakCrate(it) {
    it.type = "heal"; it.el.classList.remove("crate");
    it.el.style.background = "#2ecc71"; it.el.innerText = "♥";
}

function startGame(m) {
    mode = m; items = []; projectiles = []; setupStage();
    document.getElementById("menu").style.display = "none";
    document.getElementById("game-container").style.display = "block";
    p1.reset(true); p2.reset(true); isRunning = true; loop();
}

function loop() {
    if(!isRunning) return;

    // P1 Controls
    if(keys[p1.controls.left]) { p1.vx -= MOVE_ACCEL; p1.dir = -1; }
    if(keys[p1.controls.right]) { p1.vx += MOVE_ACCEL; p1.dir = 1; }
    
    // --- GOD RECOVERY COM AI (P2) ---
    if(mode === "com") {
        const dist = Math.abs(p1.x - p2.x);
        const stageLeft = 150, stageRight = 950, mainFloorY = 120;

        // 1. 強力な復帰ロジック
        if (p2.x < stageLeft || p2.x > stageRight || p2.y < mainFloorY - 20) {
            // ステージの方向へ移動
            const targetX = p2.x < stageLeft ? stageLeft + 50 : stageRight - 50;
            p2.vx += (p2.x < targetX ? 1.2 : -1.2);

            // 高度不足または落下中にジャンプ (温存しつつ使う)
            if (p2.vy < -2 && (p2.y < mainFloorY + 50)) {
                p2.jump();
            }
            // 復帰中にプレイヤーが邪魔なら攻撃
            if (dist < 100) p2.attack(p1);
        } 
        // 2. 通常の立ち回り
        else {
            const targetCrate = items.find(it => it.type === "crate");
            if(targetCrate) {
                p2.vx += (p2.x < targetCrate.x ? 0.9 : -0.9);
                if(Math.abs(p2.x - targetCrate.x) < 60) p2.attack(p1);
            } else {
                p2.vx += (p2.x < p1.x ? 0.75 : -0.75);
            }

            if(dist < 120) p2.attack(p1);
            if(dist < 300 && dist > 150 && Math.random() < 0.03) p2.throwBomb();
            if(p1.y > p2.y + 70 && Math.random() < 0.05) p2.jump();
        }
    } else {
        if(keys[p2.controls.left]) { p2.vx -= MOVE_ACCEL; p2.dir = -1; }
        if(keys[p2.controls.right]) { p2.vx += MOVE_ACCEL; p2.dir = 1; }
    }

    p1.update(); p2.update();

    // Items, Bombs, Projectiles (Same logic as before)
    items.forEach((it, i) => {
        it.vy -= 0.5; it.x += (it.vx || 0); it.y += it.vy; it.vx *= 0.95;
        platforms.forEach(pl => {
            if(it.vy <= 0 && it.x > pl.x-20 && it.x < pl.x+pl.w && it.y <= pl.y && it.y > pl.y-20) { it.y = pl.y; it.vy = 0; it.vx = 0; }
        });
        it.el.style.left = it.x + "px"; it.el.style.bottom = it.y + "px";
        if(it.type === "bomb") {
            it.timer--;
            it.timerEl.style.width = (it.timer/150*100) + "%";
            if(it.timer <= 0) {
                [p1, p2].forEach(p => {
                    const d = Math.sqrt((p.x-it.x)**2 + (p.y-it.y)**2);
                    if(d < it.range) { p.damage += 35; p.vx = (p.x < it.x ? -22 : 22); p.vy = 16; }
                });
                showEffect("BOOM!"); it.el.remove(); items.splice(i, 1);
            }
        } else if(it.type === "heal") {
            [p1, p2].forEach(p => {
                if(Math.abs(p.x - it.x) < 40 && Math.abs(p.y - it.y) < 40) {
                    p.damage = Math.max(0, p.damage - 30); it.el.remove(); items.splice(i, 1);
                }
            });
        }
    });

    projectiles.forEach((p, i) => {
        p.x += p.vx; p.el.style.left = p.x + "px"; p.el.style.bottom = p.y + "px";
        let target = p.owner === p1 ? p2 : p1;
        if(Math.abs(p.x - target.x) < 40 && Math.abs(p.y - target.y) < 50) {
            p.owner.hit(target, p.pwr, 1.2); p.el.remove(); projectiles.splice(i, 1);
        } else if(p.x < -100 || p.x > 1200) { p.el.remove(); projectiles.splice(i, 1); }
    });

    if(Math.random() < 0.005) spawnCrate();
    requestAnimationFrame(loop);
}

function spawnCrate() {
    if(document.getElementById("item-spawn").value === "off") return;
    const it = { x: 200 + Math.random()*700, y: 600, vy: 0, type: "crate", el: document.createElement("div") };
    it.el.className = "item crate"; it.el.innerText = "📦";
    document.getElementById("game-stage").appendChild(it.el); items.push(it);
}

function endGame(win) { isRunning = false; document.getElementById("result-screen").style.display = "flex"; document.getElementById("winner-text").innerText = win + " WINS!"; }
function showEffect(t) { const o = document.getElementById("overlay"); o.innerText = t; setTimeout(()=>o.innerText="", 1000); }

window.addEventListener("keydown", e => {
    keys[e.code] = true;
    if(isRunning) {
        if(e.code === p1.controls.up) p1.jump();
        if(e.code === p1.controls.atk) p1.attack(p2);
        if(e.code === p1.controls.sp) p1.throwBomb();
        if(mode === "p2") {
            if(e.code === p2.controls.up) p2.jump();
            if(e.code === p2.controls.atk) p2.attack(p1);
            if(e.code === p2.controls.sp) p2.throwBomb();
        }
    }
});
window.addEventListener("keyup", e => keys[e.code] = false);
</script>
</body>
</html>
