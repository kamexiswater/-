<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Browser Smash DX - Stock Edition</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; overflow: hidden; }
        
        /* メニュー・リザルト画面 */
        #menu, #result-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #1a1a1a; z-index: 1000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #result-screen { display: none; background: rgba(0,0,0,0.8); }

        .char-select { margin: 10px; padding: 10px; font-size: 18px; border-radius: 5px; }
        button { padding: 15px 40px; font-size: 22px; cursor: pointer; background: #ff4757; color: white; border: none; border-radius: 8px; margin: 15px; transition: 0.2s; }
        button:hover { background: #ff6b81; transform: scale(1.05); }

        /* ゲーム画面 */
        #game-container { display: none; }
        #ui-container { margin-top: 20px; display: flex; justify-content: center; gap: 50px; }
        .status-card { background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 10px; border: 2px solid #444; min-width: 150px; }
        .damage-percent { font-size: 48px; font-weight: bold; }
        .stock-display { font-size: 24px; color: #ff4757; margin-top: 5px; }
        
        #game-stage {
            width: 1000px; height: 600px; margin: 20px auto;
            background: linear-gradient(to bottom, #1e3c72, #2a5298);
            border: 5px solid #000; position: relative; overflow: hidden;
        }
        .main-platform { position: absolute; left: 200px; bottom: 150px; width: 600px; height: 40px; background: #444; border-bottom: 10px solid #222; }
        
        /* キャラクターとラベル */
        .player { position: absolute; width: 40px; height: 60px; pointer-events: none; }
        .player-label {
            position: absolute; top: -35px; left: 50%; transform: translateX(-50%);
            font-weight: bold; font-size: 14px; padding: 2px 8px; border-radius: 4px;
            background: rgba(0,0,0,0.6); white-space: nowrap;
        }
        .head { width: 24px; height: 24px; background: #ffd1a4; border-radius: 50%; margin: 0 auto; border: 2px solid #000; }
        .body { width: 22px; height: 32px; margin: -2px auto; border: 2px solid #000; border-radius: 5px; }
        
        #overlay { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 100px; font-weight: bold; color: #ff0; text-shadow: 5px 5px 0 #000; pointer-events: none; z-index: 100; font-style: italic; }
    </style>
</head>
<body>

    <div id="menu">
        <h1 style="font-size: 50px; color: #ff4757;">BROWSER SMASH DX</h1>
        <div style="background: #333; padding: 20px; border-radius: 15px;">
            <div>P1: <select id="char1" class="char-select"><option value="balanced">バランス</option><option value="power">パワー</option><option value="speed">スピード</option></select></div>
            <div>P2: <select id="char2" class="char-select"><option value="balanced">バランス</option><option value="power">パワー</option><option value="speed">スピード</option></select></div>
        </div>
        <button onclick="initGame('com')">1P vs COM (3 Stocks)</button>
        <button onclick="initGame('p2')">1P vs 2P (3 Stocks)</button>
    </div>

    <div id="result-screen">
        <h1 id="winner-text" style="font-size: 60px;">PLAYER 1 WINS!</h1>
        <button onclick="backToMenu()">メニューに戻る</button>
    </div>

    <div id="game-container">
        <div id="ui-container">
            <div class="status-card">
                <div>PLAYER 1</div>
                <div id="p1-dmg" class="damage-percent">0%</div>
                <div id="p1-stock" class="stock-display">●●●</div>
            </div>
            <div class="status-card">
                <div>PLAYER 2</div>
                <div id="p2-dmg" class="damage-percent">0%</div>
                <div id="p2-stock" class="stock-display">●●●</div>
            </div>
        </div>
        <div id="game-stage">
            <div id="overlay"></div>
            <div class="main-platform"></div>
            <div id="p1" class="player"></div>
            <div id="p2" class="player"></div>
        </div>
    </div>

<script>
const GRAVITY = 0.5;
const FRICTION = 0.85;
const GROUND_Y = 150;
let gameMode = "p2";
let isRunning = false;
let animationId = null;
const keys = {};

class Fighter {
    constructor(id, startX, defaultColor, labelName) {
        this.id = id;
        this.el = document.getElementById(id);
        this.startX = startX;
        this.defaultColor = defaultColor;
        this.labelName = labelName;
        this.stock = 3;
        this.reset(true);
    }

    reset(fullReset = false) {
        if (fullReset) this.stock = 3;
        this.x = this.startX;
        this.y = 400;
        this.vx = 0;
        this.vy = 0;
        this.damage = 0;
        this.dir = (this.x < 500) ? 1 : -1;
        this.jumpCount = 0;
        this.isAttacking = false;
        this.updateVisuals();
    }

    updateVisuals() {
        const type = document.getElementById(this.id === "p1" ? "char1" : "char2").value;
        if(type === "power") { this.atkPower = 1.6; this.moveSpeed = 0.6; this.bodyColor = "#f1c40f"; }
        else if(type === "speed") { this.atkPower = 0.7; this.moveSpeed = 1.3; this.bodyColor = "#2ecc71"; }
        else { this.atkPower = 1.0; this.moveSpeed = 0.9; this.bodyColor = this.defaultColor; }
        
        // 1P/2P/COM ラベルを含めた描画
        const labelTag = (gameMode === "com" && this.id === "p2") ? "COM" : this.labelName;
        this.el.innerHTML = `
            <div class="player-label" style="border: 2px solid ${this.bodyColor}">${labelTag}</div>
            <div class="head"></div>
            <div class="body" style="background: ${this.bodyColor}"></div>
        `;
    }

    update() {
        this.vy -= GRAVITY;
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= FRICTION;

        if (this.x + 30 > 200 && this.x < 770 && this.y <= GROUND_Y && this.vy <= 0 && this.y > GROUND_Y - 20) {
            this.y = GROUND_Y;
            this.vy = 0;
            this.jumpCount = 0;
        }

        if (this.x < -100 || this.x > 1100 || this.y < -150 || this.y > 900) {
            this.loseStock();
        }
        this.draw();
    }

    draw() {
        this.el.style.left = this.x + "px";
        this.el.style.bottom = this.y + "px";
        this.el.style.transform = `scaleX(${this.dir})`;
        document.getElementById(`${this.id}-dmg`).innerText = Math.floor(this.damage) + "%";
        document.getElementById(`${this.id}-stock`).innerText = "●".repeat(Math.max(0, this.stock));
    }

    loseStock() {
        this.stock--;
        if (this.stock <= 0) {
            endGame(this.id === "p1" ? "PLAYER 2" : "PLAYER 1");
        } else {
            showOverlay("K.O.");
            this.reset(false);
        }
    }

    jump() { if (this.jumpCount < 2) { this.vy = 12; this.jumpCount++; } }

    attack(target, isSpecial = false) {
        if (this.isAttacking || this.stock <= 0) return;
        this.isAttacking = true;
        const range = isSpecial ? 90 : 60;
        const power = (isSpecial ? 18 : 8) * this.atkPower;
        if (Math.abs((this.x + (this.dir * 20)) - target.x) < range && Math.abs(this.y - target.y) < 50) {
            target.damage += power;
            const kb = (target.damage / 7) + (isSpecial ? 15 : 6);
            target.vx = this.dir * kb;
            target.vy = kb * 0.4 + 2;
        }
        setTimeout(() => this.isAttacking = false, isSpecial ? 500 : 250);
    }
}

let p1 = new Fighter("p1", 300, "#3498db", "1P");
let p2 = new Fighter("p2", 660, "#e74c3c", "2P");

function initGame(mode) {
    gameMode = mode;
    p1.reset(true);
    p2.reset(true);
    document.getElementById("menu").style.display = "none";
    document.getElementById("result-screen").style.display = "none";
    document.getElementById("game-container").style.display = "block";
    isRunning = true;
    if (!animationId) gameLoop();
}

function endGame(winner) {
    isRunning = false;
    document.getElementById("winner-text").innerText = winner + " WINS!";
    document.getElementById("result-screen").style.display = "flex";
}

function backToMenu() {
    document.getElementById("result-screen").style.display = "none";
    document.getElementById("game-container").style.display = "none";
    document.getElementById("menu").style.display = "flex";
}

window.addEventListener("keydown", e => {
    keys[e.code] = true;
    if (!isRunning) return;
    if (e.code === "KeyW") p1.jump();
    if (e.code === "KeyF") p1.attack(p2, false);
    if (e.code === "KeyG") p1.attack(p2, true);
    if (gameMode === "p2") {
        if (e.code === "ArrowUp") p2.jump();
        if (e.code === "KeyL") p2.attack(p1, false);
        if (e.code === "KeyK") p2.attack(p1, true);
    }
});
window.addEventListener("keyup", e => keys[e.code] = false);

function showOverlay(text) {
    const o = document.getElementById("overlay");
    o.innerText = text;
    setTimeout(() => o.innerText = "", 1000);
}

function gameLoop() {
    if (isRunning) {
        if (keys["KeyA"]) { p1.vx -= p1.moveSpeed; p1.dir = -1; }
        if (keys["KeyD"]) { p1.vx += p1.moveSpeed; p1.dir = 1; }
        if (gameMode === "p2") {
            if (keys["ArrowLeft"]) { p2.vx -= p2.moveSpeed; p2.dir = -1; }
            if (keys["ArrowRight"]) { p2.vx += p2.moveSpeed; p2.dir = 1; }
        } else {
            let diff = p1.x - p2.x;
            if (Math.abs(diff) > 40) { p2.vx += (diff > 0 ? 0.4 : -0.4); p2.dir = diff > 0 ? 1 : -1; }
            if (Math.abs(diff) < 70 && Math.random() < 0.05) p2.attack(p1, Math.random() < 0.2);
            if (p2.y < GROUND_Y && Math.random() < 0.05) p2.jump();
        }
        p1.update();
        p2.update();
    }
    animationId = requestAnimationFrame(gameLoop);
}
</script>
</body>
</html>
