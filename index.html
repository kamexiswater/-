<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Super Browser Smash DX</title>
    <style>
        body {
            margin: 0;
            background: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            overflow: hidden;
            user-select: none;
        }

        #ui-container {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 50px;
        }

        .status-card {
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 10px;
            border: 2px solid #444;
            min-width: 150px;
        }

        .damage-percent {
            font-size: 48px;
            font-weight: bold;
            display: block;
            transition: color 0.2s;
        }

        #game-stage {
            width: 1000px;
            height: 600px;
            margin: 20px auto;
            background: linear-gradient(to bottom, #1e3c72, #2a5298);
            border: 5px solid #000;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* ステージの床 */
        .main-platform {
            position: absolute;
            left: 200px;
            bottom: 150px;
            width: 600px;
            height: 40px;
            background: #444;
            border-bottom: 10px solid #222;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .player {
            position: absolute;
            width: 40px;
            height: 60px;
            transition: transform 0.1s;
        }

        /* キャラクターの外見 */
        .character-art {
            position: relative;
            width: 100%;
            height: 100%;
        }
        .head { width: 24px; height: 24px; background: #ffd1a4; border-radius: 50%; margin: 0 auto; border: 2px solid #000; }
        .body { width: 20px; height: 30px; background: #eee; margin: -2px auto; border: 2px solid #000; border-radius: 5px; }
        
        /* エフェクト */
        .hit-effect {
            position: absolute;
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            animation: flash 0.2s forwards;
            pointer-events: none;
        }

        @keyframes flash {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        #overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            font-weight: bold;
            color: #ff0;
            text-shadow: 5px 5px 0 #000;
            pointer-events: none;
            z-index: 100;
        }

        .controls-guide {
            color: #888;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>BROWSER SMASH DX</h1>

    <div id="ui-container">
        <div class="status-card">
            <div>PLAYER 1</div>
            <div id="p1-dmg" class="damage-percent">0%</div>
        </div>
        <div class="status-card">
            <div>PLAYER 2</div>
            <div id="p2-dmg" class="damage-percent">0%</div>
        </div>
    </div>

    <div id="game-stage">
        <div id="overlay"></div>
        <div class="main-platform"></div>
        <div id="p1" class="player"></div>
        <div id="p2" class="player"></div>
    </div>

    <div class="controls-guide">
        P1: [WASD] 移動/ジャンプ | [F] 攻撃 | [G] スペシャル <br>
        P2: [矢印キー] 移動/ジャンプ | [L] 攻撃 | [K] スペシャル
    </div>

<script>
/**
 * 定数と設定
 */
const GRAVITY = 0.5;
const FRICTION = 0.85;
const STAGE_WIDTH = 1000;
const STAGE_HEIGHT = 600;
const GROUND_Y = 150; // 下からの高さ

/**
 * キャラクタークラス
 */
class Fighter {
    constructor(id, x, color) {
        this.el = document.getElementById(id);
        this.id = id;
        this.x = x;
        this.y = GROUND_Y + 50;
        this.vx = 0;
        this.vy = 0;
        this.damage = 0;
        this.dir = (x < 500) ? 1 : -1;
        this.isJumping = false;
        this.jumpCount = 0;
        this.maxJumps = 2;
        this.width = 40;
        this.height = 60;
        this.isAttacking = false;
        
        // 見た目の生成
        this.el.innerHTML = `
            <div class="character-art" style="filter: drop-shadow(0 0 5px ${color})">
                <div class="head"></div>
                <div class="body" style="background: ${color}"></div>
            </div>
        `;
    }

    update() {
        // 重力
        this.vy -= GRAVITY;
        
        // 座標更新
        this.x += this.vx;
        this.y += this.vy;

        // 摩擦
        this.vx *= FRICTION;

        // 床との判定 (メインプラットフォーム: 200px ~ 800px)
        const onPlatform = (this.x + this.width > 200 && this.x < 800);
        if (onPlatform && this.y <= GROUND_Y && this.vy <= 0 && this.y > GROUND_Y - 20) {
            this.y = GROUND_Y;
            this.vy = 0;
            this.jumpCount = 0;
            this.isJumping = false;
        }

        // 場外判定 (バースト)
        if (this.x < -100 || this.x > STAGE_WIDTH + 100 || this.y < -100 || this.y > STAGE_HEIGHT + 200) {
            this.die();
        }

        this.draw();
    }

    draw() {
        this.el.style.left = this.x + "px";
        this.el.style.bottom = this.y + "px";
        this.el.style.transform = `scaleX(${this.dir})`;
        
        // ダメージに応じた色変化 (赤くなる)
        const dmgColor = Math.min(255, this.damage * 2);
        const display = document.getElementById(`${this.id}-dmg`);
        display.innerText = Math.floor(this.damage) + "%";
        display.style.color = `rgb(255, ${255 - dmgColor}, ${255 - dmgColor})`;
    }

    jump() {
        if (this.jumpCount < this.maxJumps) {
            this.vy = 12;
            this.jumpCount++;
        }
    }

    attack(target, isSpecial = false) {
        if (this.isAttacking) return;
        this.isAttacking = true;

        const range = isSpecial ? 80 : 50;
        const power = isSpecial ? 15 : 7;
        const knockbackBase = isSpecial ? 10 : 5;

        // 攻撃用エフェクトの表示
        const effect = document.createElement("div");
        effect.className = "attack-hitbox";
        effect.style.position = "absolute";
        effect.style.width = range + "px";
        effect.style.height = "40px";
        effect.style.background = isSpecial ? "rgba(255,0,0,0.5)" : "rgba(255,255,255,0.5)";
        effect.style.left = (this.dir === 1 ? this.width : -range) + "px";
        effect.style.top = "10px";
        this.el.appendChild(effect);

        // ヒット判定
        const hitX = this.dir === 1 ? this.x + this.width : this.x - range;
        if (hitX < target.x + target.width && hitX + range > target.x &&
            this.y < target.y + target.height && this.y + 40 > target.y) {
            
            // ヒット時処理
            target.damage += power;
            const kb = (target.damage / 10) + knockbackBase;
            target.vx = this.dir * kb;
            target.vy = kb * 0.5;
            
            createVisualEffect(target.x + 20, target.y + 30);
        }

        setTimeout(() => {
            effect.remove();
            this.isAttacking = false;
        }, isSpecial ? 300 : 150);
    }

    die() {
        showOverlay("KO!");
        this.x = 500;
        this.y = 500;
        this.vx = 0;
        this.vy = 0;
        this.damage = 0;
    }
}

/**
 * ゲーム実行処理
 */
const p1 = new Fighter("p1", 300, "#3498db");
const p2 = new Fighter("p2", 660, "#e74c3c");

const keys = {};
window.addEventListener("keydown", e => keys[e.code] = true);
window.addEventListener("keyup", e => keys[e.code] = false);

// ジャンプのトリガー（押しっぱなし防止）
window.addEventListener("keydown", e => {
    if (e.code === "KeyW") p1.jump();
    if (e.code === "ArrowUp") p2.jump();
    
    // 攻撃
    if (e.code === "KeyF") p1.attack(p2, false);
    if (e.code === "KeyG") p1.attack(p2, true);
    if (e.code === "KeyL") p2.attack(p1, false);
    if (e.code === "KeyK") p2.attack(p1, true);
});

function createVisualEffect(x, y) {
    const v = document.createElement("div");
    v.className = "hit-effect";
    v.style.left = x + "px";
    v.style.bottom = y + "px";
    document.getElementById("game-stage").appendChild(v);
    setTimeout(() => v.remove(), 200);
}

function showOverlay(text) {
    const el = document.getElementById("overlay");
    el.innerText = text;
    setTimeout(() => el.innerText = "", 1000);
}

function gameLoop() {
    // P1 コントロール
    if (keys["KeyA"]) { p1.vx -= 0.8; p1.dir = -1; }
    if (keys["KeyD"]) { p1.vx += 0.8; p1.dir = 1; }

    // P2 コントロール
    if (keys["ArrowLeft"]) { p2.vx -= 0.8; p2.dir = -1; }
    if (keys["ArrowRight"]) { p2.vx += 0.8; p2.dir = 1; }

    p1.update();
    p2.update();

    requestAnimationFrame(gameLoop);
}

// 開始
gameLoop();

</script>
</body>
</html>
