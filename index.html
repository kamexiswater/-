<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Browser Smash - Speed & Thunder Edition</title>
    <style>
        /* 既存のスタイルを維持 */
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; overflow: hidden; }
        #menu, #result-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #1a1a1a; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: #333; padding: 20px; border-radius: 15px; margin: 10px; text-align: left; }
        select { padding: 8px; font-size: 14px; border-radius: 5px; width: 150px; }
        button { background: #ff4757; color: white; cursor: pointer; font-size: 20px; padding: 12px 40px; border: none; border-radius: 8px; margin: 10px; }
        #controls-guide { margin-top: 15px; padding: 10px; background: rgba(0,0,0,0.5); border-radius: 10px; font-size: 13px; color: #ccc; }
        #game-container { display: none; }
        #ui-container { margin-top: 5px; display: flex; justify-content: center; gap: 20px; }
        .status-card { background: rgba(0,0,0,0.8); padding: 8px; border-radius: 10px; min-width: 150px; border: 3px solid #444; }
        #card-p1 { border-color: #2e86de; } 
        #card-p2 { border-color: #ff4757; } 
        .damage-percent { font-size: 28px; font-weight: bold; margin: 2px 0; }
        .sp-bar-bg { width: 100%; height: 8px; background: #444; border-radius: 4px; overflow: hidden; margin-top: 5px; border: 1px solid #000; }
        .sp-bar-fill { width: 0%; height: 100%; background: #3498db; transition: width 0.2s; box-shadow: 0 0 5px #3498db; }
        #game-stage {
            width: 1100px; height: 600px; margin: 5px auto;
            background: linear-gradient(to bottom, #050505, #1a1a2e, #16213e);
            border: 4px solid #000; position: relative; overflow: hidden;
        }
        .platform { position: absolute; background: #444; border-bottom: 5px solid #222; border-radius: 4px; z-index: 1; }
        .player { position: absolute; width: 40px; height: 60px; z-index: 10; transition: filter 0.1s; }
        .weapon-sword {
            position: absolute; width: 6px; height: 45px; background: #ccc;
            border: 1px solid #333; left: 45px; top: 15px; border-radius: 2px;
            transform-origin: bottom center; transform: rotate(20deg);
            box-shadow: 0 0 5px rgba(255,255,255,0.5);
        }
        .projectile { position: absolute; width: 14px; height: 8px; border-radius: 4px; z-index: 15; box-shadow: 0 0 8px #ff0; }
        .item { position: absolute; width: 34px; height: 34px; z-index: 5; display: flex; justify-content: center; align-items: center; font-weight: bold; border-radius: 4px; font-size: 20px; }
        .crate { background: #8b4513; border: 2px solid #5d2e0a; color: #ffd700; }
        .explosion-hint { position: absolute; border-radius: 50%; background: rgba(255, 0, 0, 0.2); border: 2px solid rgba(255, 0, 0, 0.5); pointer-events: none; transform: translate(-50%, 50%); z-index: 2; }
        #overlay { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); font-size: 60px; font-weight: bold; color: #ff0; text-shadow: 3px 3px 0 #000; pointer-events: none; z-index: 100; }
        /* 雷エフェクト */
        .thunder-bolt { position: absolute; width: 10px; background: #fff; box-shadow: 0 0 20px #0ff; z-index: 20; pointer-events: none; }
    </style>
</head>
<body>
    <div id="menu">
        <h1 style="color: #4cd137;">BROWSER SMASH <span style="font-size:12px; color:gold;">SPEED & THUNDER</span></h1>
        <div class="config-grid">
            <strong>【P1設定】</strong><strong>【P2/COM設定】</strong>
            <div>タイプ: <select id="type1"><option value="gun" selected>銃(Range)</option><option value="fighter">格闘(Speed)</option><option value="sword">剣(Balance)</option></select></div>
            <div>タイプ: <select id="type2"><option value="gun">銃(Range)</option><option value="fighter">格闘(Speed)</option><option value="sword" selected>剣(Balance)</option></select></div>
            
            <div>移動速度: <select id="speed1"><option value="0.8">遅い</option><option value="1.4" selected>ふつう</option><option value="2.0">速い</option></select></div>
            <div>移動速度: <select id="speed2"><option value="0.8">遅い</option><option value="1.4" selected>ふつう</option><option value="2.0">速い</option></select></div>

            <strong>【システム設定】</strong><strong>【AIレベル】</strong>
            <div>ゲーム速度: <select id="game-speed"><option value="0.7">低速</option><option value="1.0" selected>通常</option><option value="1.4">高速</option></select></div>
            <div>思考Lv: <select id="com-lvl"><option value="1">Lv.1</option><option value="3">Lv.3</option><option value="max" selected>Lv.MAX</option></select></div>
        </div>
        <div id="controls-guide"></div>
        <div style="margin-top:10px;"><button onclick="startGame('com')">VS COM</button><button onclick="startGame('p2')">VS 2P</button></div>
    </div>
    <div id="result-screen" style="display:none;"><h1 id="winner-text"></h1><button onclick="location.reload()">タイトルへ</button></div>
    <div id="game-container">
        <div id="ui-container">
            <div class="status-card" id="card-p1">P1 <div id="p1-val" class="damage-percent">0%</div><div id="p1-sub">●●●</div><div class="sp-bar-bg"><div id="p1-sp" class="sp-bar-fill"></div></div><div id="p1-holding" style="color:#ff0; font-size:12px;"></div></div>
            <div class="status-card" id="card-p2">P2 <div id="p2-val" class="damage-percent">0%</div><div id="p2-sub">●●●</div><div class="sp-bar-bg"><div id="p2-sp" class="sp-bar-fill"></div></div><div id="p2-holding" style="color:#ff0; font-size:12px;"></div></div>
        </div>
        <div id="game-stage">
            <div id="overlay"></div>
        </div>
    </div>

<script>
let SPEED_FACTOR = 1.0; // ゲームスピード倍率
const GRAVITY_BASE = 0.62, FRICTION_BASE = 0.90;
let mode = "p2", isRunning = false, projectiles = [], items = [], keys = {}, platforms = [];
let itemTimer = null;
let p1, p2;

// --- 初期化・コントロール設定は維持 ---
function updateGuide() {
    document.getElementById("controls-guide").innerHTML = `P1 [WASD]: W:跳 A:左 D:右 F:攻 G:SP<br>P2 [ARROWS]: ↑:跳 ←:左 →:右 .:攻 ,:SP`;
}
updateGuide();

const getControls = (id) => {
    return id === "p1" ? 
        { up: "KeyW", left: "KeyA", right: "KeyD", atk: "KeyF", sp: "KeyG" } : 
        { up: "ArrowUp", left: "ArrowLeft", right: "ArrowRight", atk: "Period", sp: "Comma" };
};

class Fighter {
    constructor(id, x, color, label) {
        this.id = id; this.startX = x; this.color = color; this.label = label;
        this.el = null; this.holding = null; this.sp = 0;
        this.isCom = false;
        this.isGrabbingLedge = false;
        this.ledgeCooldown = 0;
    }
    reset(full) {
        if(full) { this.stock = 3; this.sp = 0; }
        this.damage = 0; this.x = this.startX; this.y = 350; this.holding = null;
        this.oldY = 350; this.vx = 0; this.vy = 0; this.dir = (this.x < 550) ? 1 : -1;
        this.jumps = 0; this.isAtk = false;
        this.isGrabbingLedge = false;
        this.ledgeCooldown = 0;
        this.controls = getControls(this.id);
        this.isInvincible = true; setTimeout(() => this.isInvincible = false, 1500);
        
        this.type = document.getElementById(this.id==="p1"?"type1":"type2").value;
        const userSpeed = parseFloat(document.getElementById(this.id==="p1"?"speed1":"speed2").value);
        
        const stats = { 
            fighter: [14, 280, userSpeed, 16], 
            sword: [10, 280, userSpeed * 0.85, 15], 
            gun: [7, 350, userSpeed * 0.9, 15]
        };
        [this.meleeP, this.cd, this.accel, this.jumpV] = stats[this.type];
        
        if(!this.el) {
            this.el = document.createElement("div");
            this.el.id = this.id;
            this.el.className = `player`;
            document.getElementById("game-stage").appendChild(this.el);
        }
        const swordHtml = this.type === "sword" ? `<div class="weapon-sword" id="${this.id}-sword"></div>` : "";
        this.el.innerHTML = `
            <div style="position:absolute;top:-25px;width:100%;text-align:center;font-size:11px;">${this.label}</div>
            <div style="width:20px;height:20px;background:#ffd1a4;border-radius:50%;margin:0 auto;border:2px solid #000;"></div>
            <div style="width:22px;height:30px;background:${this.color};margin:-2px auto;border:2px solid #000;border-radius:4px;"></div>
            ${swordHtml}`;
    }
    
    jump() { 
        if(this.isGrabbingLedge) {
            this.isGrabbingLedge = false;
            this.vy = this.jumpV * SPEED_FACTOR;
            this.jumps = 1;
            this.ledgeCooldown = 40;
            return;
        }
        if(this.jumps < 2) { this.vy = this.jumpV * SPEED_FACTOR; this.jumps++; } 
    }
    
    update() {
        if (this.ledgeCooldown > 0) this.ledgeCooldown--;

        if (this.isGrabbingLedge) {
            this.vx = 0; this.vy = 0;
        } else {
            this.oldY = this.y; 
            this.vy -= (GRAVITY_BASE * SPEED_FACTOR); 
            this.x += (this.vx * SPEED_FACTOR); 
            this.y += (this.vy * SPEED_FACTOR); 
            this.vx *= FRICTION_BASE;
            
            platforms.forEach(p => {
                if (this.vy <= 0 && (this.x + 25 > p.x && this.x + 5 < p.x + p.w)) {
                    if (this.oldY >= p.y && this.y <= p.y) { this.y = p.y; this.vy = 0; this.jumps = 0; }
                }
            });

            // 一番下の地形(platforms[0])だけに崖つかみ判定
            let mainStage = platforms[0];
            if (this.vy < 0 && this.ledgeCooldown <= 0 && mainStage) {
                if (Math.abs(this.x + 35 - mainStage.x) < 15 && Math.abs(this.y - (mainStage.y - 40)) < 25) {
                    this.isGrabbingLedge = true; this.x = mainStage.x - 35; this.y = mainStage.y - 40; this.dir = 1;
                }
                if (Math.abs(this.x + 5 - (mainStage.x + mainStage.w)) < 15 && Math.abs(this.y - (mainStage.y - 40)) < 25) {
                    this.isGrabbingLedge = true; this.x = mainStage.x + mainStage.w - 5; this.y = mainStage.y - 40; this.dir = -1;
                }
            }
        }

        if (this.x < -400 || this.x > 1500 || this.y < -500) this.out();
        
        if(this.el) {
            this.el.style.left = this.x + "px"; this.el.style.bottom = this.y + "px";
            this.el.style.transform = `scaleX(${this.dir})`;
            this.el.style.opacity = this.isInvincible ? 0.5 : 1;
        }
        document.getElementById(this.id+"-val").innerText = Math.floor(this.damage) + "%";
        document.getElementById(this.id+"-sub").innerText = "●".repeat(Math.max(0, this.stock));
        document.getElementById(this.id+"-holding").innerText = this.holding ? "ITEM: " + this.holding.toUpperCase() : "";
        document.getElementById(this.id+"-sp").style.width = this.sp + "%";
    }

    out() { this.stock--; if(this.stock <= 0) endGame(this.id==="p1"?"P2":"P1"); else { showEffect("K.O."); this.reset(false); } }

    attack(target) {
        if(this.isAtk || this.isGrabbingLedge) return;
        if(this.holding === "bomb") { this.throwBomb(); return; }
        if(this.holding === "thunder") { this.useThunder(target); return; }
        
        this.isAtk = true;
        if(this.type === "gun") { 
            for(let i=0; i<3; i++) setTimeout(() => this.fireProjectile(this.meleeP, 22), i * 100);
        } else {
            const reach = this.type === "sword" ? 115 : 75;
            if(Math.abs(this.x - target.x) < reach && Math.abs(this.y - target.y) < 70) {
                this.hit(target, this.meleeP, this.type === "fighter" ? 1.6 : 1.4);
            }
        }
        items.forEach(it => { if(it.type === "crate" && Math.abs(this.x - it.x) < 80 && Math.abs(this.y - it.y) < 60) breakCrate(it); });
        setTimeout(()=>this.isAtk=false, this.cd);
    }

    useThunder(target) {
        this.holding = null;
        showEffect("THUNDER!!");
        const bolt = document.createElement("div");
        bolt.className = "thunder-bolt";
        bolt.style.left = (target.x + 15) + "px";
        bolt.style.bottom = target.y + "px";
        bolt.style.height = (600 - target.y) + "px";
        document.getElementById("game-stage").appendChild(bolt);
        
        this.hit(target, 20, 2.0);
        target.vy = 20; // 真上に打ち上げ
        
        setTimeout(() => bolt.remove(), 200);
    }

    // --- Super / Bomb / Projectile 処理は元のロジックをベースにSPEED_FACTOR対応 ---
    trySuper(target) { if(this.sp >= 100 && !this.isAtk && !this.isGrabbingLedge) this.useSuper(target); }
    useSuper(target) {
        this.sp = 0; this.isAtk = true;
        if(this.type === "fighter") {
            showEffect("METEOR!!");
            if(Math.sqrt((this.x-target.x)**2 + (this.y-target.y)**2) < 200) {
                target.vy = 25; this.hit(target, 40, 3.5);
            }
        } else if(this.type === "sword") {
            showEffect("CYCLONE!!");
            if(Math.sqrt((this.x - target.x)**2 + (this.y - target.y)**2) < 160) this.hit(target, 30, 2.5);
        } else {
            showEffect("BARRAGE!!");
            for(let i=0; i<15; i++) setTimeout(() => this.fireProjectile(12, 40), i * 50);
        }
        setTimeout(() => this.isAtk = false, 1000);
    }

    throwBomb() {
        this.holding = null;
        const b = { x: this.x + (this.dir * 10), y: this.y, vx: this.dir * 12, vy: 5, type: "bomb_active", timer: 100, range: 250, el: document.createElement("div"), hintEl: document.createElement("div") };
        b.el.className = "item"; b.el.style.background = "#333"; b.el.style.borderRadius = "50%"; b.el.innerText = "💣";
        b.hintEl.className = "explosion-hint"; b.hintEl.style.width = (b.range*2)+"px"; b.hintEl.style.height = (b.range*2)+"px"; b.hintEl.style.display = "none";
        document.getElementById("game-stage").appendChild(b.el); document.getElementById("game-stage").appendChild(b.hintEl); items.push(b);
    }

    fireProjectile(pwr, speed) {
        const p = { x: this.x + (this.dir*30), y: this.y + 25, vx: this.dir*speed, owner: this, pwr, el: document.createElement("div") };
        p.el.className = "projectile"; p.el.style.background = "#ffff00";
        document.getElementById("game-stage").appendChild(p.el); projectiles.push(p);
    }

    hit(target, pwr, kbM) { 
        if(target.isInvincible) return; 
        target.isGrabbingLedge = false;
        target.damage += pwr; this.sp = Math.min(100, this.sp + pwr * 2.2);
        const kb = ((target.damage / 7) + 8) * kbM; 
        target.vx = (target.x < this.x ? -1 : 1) * kb; target.vy = kb * 0.3 + 5; 
    }
}

p1 = new Fighter("p1", 300, "#2e86de", "P1");
p2 = new Fighter("p2", 800, "#ff4757", "P2");

function startGame(m) {
    SPEED_FACTOR = parseFloat(document.getElementById("game-speed").value);
    if(itemTimer) clearTimeout(itemTimer);
    mode = m; items = []; projectiles = []; setupStage();
    document.getElementById("menu").style.display = "none";
    document.getElementById("game-container").style.display = "block";
    p1.isCom = false; p2.isCom = (m === "com");
    p1.reset(true); p2.reset(true); isRunning = true; 
    const scheduleNextItem = () => {
        itemTimer = setTimeout(() => { if(isRunning) { spawnCrate(); scheduleNextItem(); } }, 6000 + Math.random() * 5000);
    };
    scheduleNextItem(); loop();
}

function loop() {
    if(!isRunning) return;
    
    // P1入力
    if(!p1.isGrabbingLedge) {
        if(keys[p1.controls.left]) { p1.vx -= p1.accel; p1.dir = -1; }
        if(keys[p1.controls.right]) { p1.vx += p1.accel; p1.dir = 1; }
    }
    
    // COM AI (簡易)
    if(mode === "com") {
        if (p2.isGrabbingLedge) { if (Math.random() < 0.05) p2.jump(); }
        else {
            p2.vx += (p2.x < p1.x ? p2.accel : -p2.accel);
            if (Math.abs(p1.x - p2.x) < 200) p2.attack(p1);
            if (p1.y > p2.y + 50 || p2.y < 130) p2.jump();
        }
    } else {
        if(!p2.isGrabbingLedge) {
            if(keys[p2.controls.left]) { p2.vx -= p2.accel; p2.dir = -1; }
            if(keys[p2.controls.right]) { p2.vx += p2.accel; p2.dir = 1; }
        }
    }
    
    p1.update(); p2.update();
    
    // 項目・発射物処理
    items.forEach((it, i) => {
        if(it.type !== "bomb_active") {
            [p1, p2].forEach(p => {
                if(Math.abs(p.x - it.x) < 40 && Math.abs(p.y - it.y) < 40) {
                    if(it.type === "heal") { p.damage = Math.max(0, p.damage - 40); it.el.remove(); items.splice(i, 1); }
                    else if(it.type === "bomb_item") { p.holding = "bomb"; it.el.remove(); items.splice(i, 1); }
                    else if(it.type === "thunder_item") { p.holding = "thunder"; it.el.remove(); items.splice(i, 1); }
                }
            });
        }
        it.vy -= 0.5 * SPEED_FACTOR; it.x += (it.vx || 0) * SPEED_FACTOR; it.y += it.vy * SPEED_FACTOR;
        platforms.forEach(pl => { if(it.vy <= 0 && it.x > pl.x-20 && it.x < pl.x+pl.w && it.y <= pl.y && it.y > pl.y-20) { it.y = pl.y; it.vy = 0; } });
        it.el.style.left = it.x + "px"; it.el.style.bottom = it.y + "px";
        if(it.type === "bomb_active") {
            it.timer--;
            if(it.timer <= 0) {
                [p1, p2].forEach(p => { if(Math.sqrt((p.x-it.x)**2 + (p.y-it.y)**2) < it.range) { p.damage += 30; p.vx = (p.x < it.x ? -15 : 15); p.vy = 12; } });
                showEffect("BOOM!"); it.el.remove(); items.splice(i, 1);
            }
        }
    });
    
    projectiles.forEach((p, i) => {
        p.x += p.vx * SPEED_FACTOR; p.el.style.left = p.x + "px"; p.el.style.bottom = p.y + "px";
        let target = p.owner === p1 ? p2 : p1;
        if(Math.abs(p.x - target.x) < 40 && Math.abs(p.y - target.y) < 50) { p.owner.hit(target, p.pwr, 1.4); p.el.remove(); projectiles.splice(i, 1); }
        else if(p.x < -300 || p.x > 1400) { p.el.remove(); projectiles.splice(i, 1); }
    });
    requestAnimationFrame(loop);
}

function setupStage() {
    platforms = [{x: 150, y: 120, w: 800}, {x: 300, y: 280, w: 200}, {x: 600, y: 280, w: 200}];
    const stageEl = document.getElementById("game-stage");
    stageEl.querySelectorAll('.platform, .item, .projectile, .thunder-bolt').forEach(el => el.remove());
    platforms.forEach(p => {
        const div = document.createElement("div"); div.className = "platform";
        div.style.left = p.x + "px"; div.style.bottom = p.y + "px"; div.style.width = p.w + "px"; div.style.height = "15px"; stageEl.appendChild(div);
    });
}
function breakCrate(it) {
    const r = Math.random();
    it.type = r < 0.3 ? "bomb_item" : (r < 0.6 ? "thunder_item" : "heal");
    it.el.classList.remove("crate"); 
    it.el.style.background = it.type==="heal"?"#2ecc71":(it.type==="thunder_item"?"#0ff":"#555");
    it.el.innerText = it.type==="heal"?"♥":(it.type==="thunder_item"?"⚡":"💣");
}
function spawnCrate() {
    if(document.getElementById("item-spawn").value === "off") return;
    const it = { x: 200 + Math.random()*700, y: 600, vy: 0, type: "crate", el: document.createElement("div") };
    it.el.className = "item crate"; it.el.innerText = "📦"; document.getElementById("game-stage").appendChild(it.el); items.push(it);
}
function endGame(win) { isRunning = false; document.getElementById("result-screen").style.display = "flex"; document.getElementById("winner-text").innerText = win + " WINS!"; }
function showEffect(t) { const o = document.getElementById("overlay"); o.innerText = t; setTimeout(()=>o.innerText="", 1000); }

window.addEventListener("keydown", e => {
    keys[e.code] = true;
    if(isRunning) {
        if(e.code === p1.controls.up) p1.jump();
        if(e.code === p1.controls.atk) p1.attack(p2);
        if(e.code === p1.controls.sp) p1.trySuper(p2);
        if(mode === "p2") {
            if(e.code === p2.controls.up) p2.jump();
            if(e.code === p2.controls.atk) p2.attack(p1);
            if(e.code === p2.controls.sp) p2.trySuper(p1);
        }
    }
});
window.addEventListener("keyup", e => keys[e.code] = false);
</script>
</body>
</html>
